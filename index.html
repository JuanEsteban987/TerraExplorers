<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slime Rancher 2D - User Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #7BA05B;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #8FBC8F;
            border: 4px solid #556B2F;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
        }
        .panel {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #333;
            pointer-events: auto;
        }
        #money-display {
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 1px 1px 2px #000;
        }
        .controls button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 15px;
            margin: 0 5px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .controls button:hover { background: #45a049; }
        .controls button.active { background: #FF9800; border: 2px solid #333;}
        
        #almanac-modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 3px solid #333;
            width: 300px;
            z-index: 10;
            pointer-events: auto;
        }
        #almanac-modal h2 { margin-top: 0; }
        .slime-entry { display: flex; align-items: center; margin-bottom: 10px; }
        .slime-color { width: 20px; height: 20px; border-radius: 50%; margin-right: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui-layer">
        <div class="panel" id="money-display">💰 $150</div>
        <div class="panel controls">
            <button id="btn-vac" class="active">Aspiradora (Recolectar)</button>
            <button id="btn-feed">Lanzar Comida ($5)</button>
            <button id="btn-build">Construir Corral ($100)</button>
            <button id="btn-almanac">Almanaque</button>
        </div>
    </div>

    <div id="almanac-modal">
        <h2>Almanaque de Slimes</h2>
        <div class="slime-entry">
            <div class="slime-color" style="background: #FF69B4;"></div>
            <div><strong>Slime Rosa:</strong> Come de todo. Plort: $10</div>
        </div>
        <div class="slime-entry">
            <div class="slime-color" style="background: #4169E1;"></div>
            <div><strong>Slime Roca:</strong> (Próximamente). Plort: $25</div>
        </div>
        <button onclick="document.getElementById('almanac-modal').style.display='none'">Cerrar</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Estado del juego
    let money = 150;
    let currentMode = 'vac'; // vac, feed, build
    
    // UI Elements
    const moneyDisplay = document.getElementById('money-display');
    const btnVac = document.getElementById('btn-vac');
    const btnFeed = document.getElementById('btn-feed');
    const btnBuild = document.getElementById('btn-build');
    const btnAlmanac = document.getElementById('btn-almanac');
    const almanacModal = document.getElementById('almanac-modal');

    // Cambiar modos
    function setMode(mode) {
        currentMode = mode;
        btnVac.classList.remove('active');
        btnFeed.classList.remove('active');
        btnBuild.classList.remove('active');
        if(mode === 'vac') btnVac.classList.add('active');
        if(mode === 'feed') btnFeed.classList.add('active');
        if(mode === 'build') btnBuild.classList.add('active');
    }

    btnVac.onclick = () => setMode('vac');
    btnFeed.onclick = () => setMode('feed');
    btnBuild.onclick = () => setMode('build');
    btnAlmanac.onclick = () => almanacModal.style.display = 'block';

    function updateMoney(amount) {
        money += amount;
        moneyDisplay.innerText = `💰 $${money}`;
    }

    // Estructuras de datos
    const slimes = [];
    const plorts = [];
    const foods = [];
    const plots = [
        {x: 100, y: 100, w: 250, h: 250, type: 'empty'},
        {x: 450, y: 100, w: 250, h: 250, type: 'empty'},
    ];

    class Slime {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.radius = 15;
            this.color = '#FF69B4'; // Rosa por defecto
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 0.5) * 2;
            this.hunger = 0;
            this.plotId = this.getCurrentPlot(); // Para mantenerlos en su corral
        }

        getCurrentPlot() {
            for (let i = 0; i < plots.length; i++) {
                let p = plots[i];
                if (this.x > p.x && this.x < p.x + p.w && this.y > p.y && this.y < p.y + p.h) {
                    return i;
                }
            }
            return -1;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.hunger += 0.05;

            // Físicas básicas (Rebote en paredes del canvas)
            if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) this.vx *= -1;
            if (this.y - this.radius < 0 || this.y + this.radius > canvas.height) this.vy *= -1;

            // Colisión con corrales
            if (this.plotId !== -1 && plots[this.plotId].type === 'corral') {
                let p = plots[this.plotId];
                if (this.x - this.radius < p.x) { this.x = p.x + this.radius; this.vx *= -1; }
                if (this.x + this.radius > p.x + p.w) { this.x = p.x + p.w - this.radius; this.vx *= -1; }
                if (this.y - this.radius < p.y) { this.y = p.y + this.radius; this.vy *= -1; }
                if (this.y + this.radius > p.y + p.h) { this.y = p.y + p.h - this.radius; this.vy *= -1; }
            }

            // Comer
            if (this.hunger > 10) {
                for (let i = 0; i < foods.length; i++) {
                    let f = foods[i];
                    let dist = Math.hypot(this.x - f.x, this.y - f.y);
                    if (dist < this.radius + f.radius) {
                        foods.splice(i, 1);
                        this.hunger = 0;
                        // Producir plort
                        plorts.push({x: this.x, y: this.y + 10, value: 10, radius: 6, color: '#FFB6C1'});
                        break;
                    }
                }
            }
        }

        draw(ctx) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.strokeStyle = '#C71585';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Ojos
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(this.x - 5, this.y - 3, 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(this.x + 5, this.y - 3, 2, 0, Math.PI * 2); ctx.fill();
        }
    }

    // Inicializar algunos slimes libres
    for(let i=0; i<3; i++) {
        slimes.push(new Slime(canvas.width/2 + Math.random()*50, canvas.height - 100 + Math.random()*50));
    }

    // Interacciones del mouse
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        if (currentMode === 'build') {
            // Revisar si clickeamos una parcela vacía
            for (let p of plots) {
                if (mouseX > p.x && mouseX < p.x + p.w && mouseY > p.y && mouseY < p.y + p.h) {
                    if (p.type === 'empty' && money >= 100) {
                        p.type = 'corral';
                        updateMoney(-100);
                        
                        // Añadir un par de slimes al nuevo corral para probar
                        let s1 = new Slime(p.x + p.w/2, p.y + p.h/2);
                        let s2 = new Slime(p.x + p.w/2 + 20, p.y + p.h/2);
                        s1.plotId = slimes.length; // hack rápido
                        s2.plotId = slimes.length + 1;
                        slimes.push(s1, s2);
                        // Reasignar IDs de parcela correctamente
                        slimes.forEach(s => s.plotId = s.getCurrentPlot());
                    }
                }
            }
        } 
        else if (currentMode === 'feed') {
            if (money >= 5) {
                updateMoney(-5);
                foods.push({x: mouseX, y: mouseY, radius: 4, color: '#8B4513'});
            }
        }
        else if (currentMode === 'vac') {
            // Recolectar plorts
            for (let i = plorts.length - 1; i >= 0; i--) {
                let plort = plorts[i];
                let dist = Math.hypot(mouseX - plort.x, mouseY - plort.y);
                if (dist < 30) { // Radio de succión
                    updateMoney(plort.value);
                    plorts.splice(i, 1);
                }
            }
        }
    });

    // Bucle principal del juego
    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Dibujar parcelas
        for (let p of plots) {
            ctx.fillStyle = p.type === 'empty' ? 'rgba(0,0,0,0.1)' : 'rgba(139, 69, 19, 0.3)';
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.strokeStyle = p.type === 'empty' ? 'rgba(255,255,255,0.3)' : '#8B4513';
            ctx.lineWidth = 4;
            ctx.strokeRect(p.x, p.y, p.w, p.h);
            
            if (p.type === 'empty') {
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '16px Arial';
                ctx.fillText('Parcela Vacía', p.x + p.w/2 - 45, p.y + p.h/2);
            }
        }

        // Dibujar comida
        for (let f of foods) {
            ctx.beginPath();
            ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2);
            ctx.fillStyle = f.color;
            ctx.fill();
        }

        // Dibujar plorts
        for (let pl of plorts) {
            ctx.beginPath();
            ctx.moveTo(pl.x, pl.y - pl.radius);
            ctx.lineTo(pl.x + pl.radius, pl.y + pl.radius);
            ctx.lineTo(pl.x - pl.radius, pl.y + pl.radius);
            ctx.closePath();
            ctx.fillStyle = pl.color;
            ctx.fill();
            ctx.strokeStyle = '#FF69B4';
            ctx.stroke();
        }

        // Actualizar y dibujar slimes
        for (let s of slimes) {
            s.update();
            s.draw(ctx);
        }

        requestAnimationFrame(gameLoop);
    }

    // Iniciar
    gameLoop();
</script>

</body>
</html>
