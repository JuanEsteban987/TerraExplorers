<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockIngenier · Scratch con Blockly</title>
    <!-- Blockly -->
    <script src="https://unpkg.com/blockly@10.4.3/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly@10.4.3/blocks.min.js"></script>
    <script src="https://unpkg.com/blockly@10.4.3/javascript.min.js"></script>
    <script src="https://unpkg.com/blockly@10.4.3/msg/es.min.js"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --text: #e0e0e0;
            --header-bg: #0d0d1a;
            --border: #2a2a4a;
            --accent: #4da6ff;
            --stage-bg: #f0f0f5;
            --workspace-bg: #1e1e35;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #header {
            background: var(--header-bg);
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        #header .logo { font-size: 1.3em; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; }
        #header .logo span { color: #ff6b9d; }
        #header button {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 7px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.15s;
            white-space: nowrap;
        }
        #header button:hover { background: #1a4a80; border-color: var(--accent); box-shadow: 0 0 12px rgba(77,166,255,0.2); }
        .run-btn { background: #2d8a4e !important; border-color: #3cb868 !important; font-weight: 700; }
        .stop-btn { background: #8a2d2d !important; border-color: #b83c3c !important; font-weight: 700; }
        #main { display: flex; flex: 1; overflow: hidden; }
        #blocklyDiv { flex: 1; height: 100%; background: var(--workspace-bg); }
        #stage-panel {
            width: 380px; min-width: 380px; background: var(--surface);
            border-left: 1px solid var(--border); display: flex; flex-direction: column;
            padding: 10px; gap: 8px; overflow-y: auto;
        }
        #stage-wrapper {
            background: var(--stage-bg); border-radius: 10px; overflow: hidden;
            border: 3px solid #333; aspect-ratio: 4 / 3; position: relative;
        }
        #stage-canvas { width: 100%; height: 100%; display: block; background: #fff; }
        #sprite-info {
            background: var(--surface); border-radius: 8px; padding: 10px;
            font-size: 0.8em; display: flex; flex-wrap: wrap; gap: 8px;
        }
        #sprite-info strong { color: var(--accent); }
        #variable-display {
            background: var(--surface); border-radius: 8px; padding: 8px 12px;
            font-size: 0.78em; max-height: 150px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 6px;
        }
        .var-item { background: #2a2a4a; padding: 4px 10px; border-radius: 12px; font-size: 0.75em; border: 1px solid #444; }
        #output-console {
            background: #0a0a14; border-radius: 8px; padding: 8px 12px; font-size: 0.7em;
            max-height: 100px; overflow-y: auto; color: #8f8; font-family: 'Consolas', monospace; border: 1px solid #333;
        }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #2d8a4e; color: #fff; padding: 10px 24px; border-radius: 20px;
            font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity:1; }
        @media (max-width: 900px) {
            #main { flex-direction: column; }
            #stage-panel { width: 100%; min-width: 100%; flex-direction: row; flex-wrap: wrap; }
            #stage-wrapper { width: 150px; }
        }
    </style>
</head>
<body>
<div id="header">
    <div class="logo">🧩 Block<span>Ingenier</span></div>
    <button class="run-btn" onclick="runProject()">🚩 Ejecutar</button>
    <button class="stop-btn" onclick="stopProject()">⏹ Detener</button>
    <button onclick="saveProject()">💾 Guardar</button>
    <button onclick="loadProject()">📂 Cargar</button>
    <button onclick="clearWorkspace()">🗑 Limpiar</button>
</div>
<div id="main">
    <div id="blocklyDiv"></div>
    <div id="stage-panel">
        <div id="stage-wrapper">
            <canvas id="stage-canvas" width="480" height="360"></canvas>
        </div>
        <div id="sprite-info">
            <span>Sprite:</span><strong id="sprite-name">Gato</strong>
            <span>X:</span><strong id="sprite-x">0</strong>
            <span>Y:</span><strong id="sprite-y">0</strong>
            <span>Dir:</span><strong id="sprite-dir">90°</strong>
            <span>Tam:</span><strong id="sprite-size">100%</strong>
        </div>
        <div id="variable-display"></div>
        <div id="output-console">▶ Consola lista. Ejecuta el proyecto.</div>
    </div>
</div>
<div class="toast" id="toast"></div>

            this.setOutput(true, 'String'); this.setColour('#59C059');
        }},
        'operators_length': { init() {
            this.appendValueInput('TEXT').setCheck('String');
            this.appendDummyInput().appendField("longitud de");
            this.setInputsInline(true); this.setOutput(true, 'Number'); this.setColour('#59C059');
        }},
        'operators_contains': { init() {
            this.appendValueInput('TEXT').setCheck('String');
            this.appendValueInput('SUB').setCheck('String');
            this.appendDummyInput().appendField("contiene");
            this.setInputsInline(true); this.setOutput(true, 'Boolean'); this.setColour('#59C059');
        }},
        'operators_mod': { init() {
            this.appendValueInput('A').setCheck('Number');
            this.appendDummyInput().appendField('módulo');
            this.appendValueInput('B').setCheck('Number');
            this.setInputsInline(true); this.setOutput(true, 'Number'); this.setColour('#59C059');
        }},
        'operators_round': { init() {
            this.appendValueInput('VAL').setCheck('Number');
            this.appendDummyInput().appendField("redondear");
            this.setInputsInline(true); this.setOutput(true, 'Number'); this.setColour('#59C059');
        }},
        'operators_sqrt': { init() {
            this.appendValueInput('VAL').setCheck('Number');
            this.appendDummyInput().appendField("raíz cuadrada");
            this.setInputsInline(true); this.setOutput(true, 'Number'); this.setColour('#59C059');
        }},
        // Variables (naranja oscuro)
        'variables_set': { init() {
            this.appendDummyInput().appendField("fijar").appendField(new Blockly.FieldVariable("miVar"), "VAR")
                .appendField("a").appendField(new Blockly.FieldNumber(0), "VAL");
            this.setPreviousStatement(true); this.setNextStatement(true); this.setColour('#FF8C1A');
        }},
        'variables_change': { init() {
            this.appendDummyInput().appendField("cambiar").appendField(new Blockly.FieldVariable("miVar"), "VAR")
                .appendField("por").appendField(new Blockly.FieldNumber(1), "DVAL");
            this.setPreviousStatement(true); this.setNextStatement(true); this.setColour('#FF8C1A');
        }},
        'variables_get': { init() {
            this.appendDummyInput().appendField(new Blockly.FieldVariable("miVar"), "VAR");
            this.setOutput(true, null); this.setColour('#FF8C1A');
        }},
        // Mis Bloques (rosa oscuro)
        'myblocks_define': { init() {
            this.appendDummyInput().appendField("definir").appendField(new Blockly.FieldTextInput("miBloque"), "NAME");
            this.setNextStatement(true); this.setColour('#FF6680');
        }},
        'myblocks_call': { init() {
            this.appendDummyInput().appendField("llamar").appendField(new Blockly.FieldTextInput("miBloque"), "NAME");
            this.setPreviousStatement(true); this.setNextStatement(true); this.setColour('#FF6680');
        }},
    };
    for (const [name, def] of Object.entries(blockDefs)) {
        Blockly.Blocks[name] = def;
    }

    // Caja de herramientas
    const toolbox = {
        kind: 'categoryToolbox',
        contents: [
            { kind: 'category', name: 'Movimiento', colour: '#4C97FF', blocks: [
                { kind: 'block', type: 'motion_movesteps' }, { kind: 'block', type: 'motion_turnright' },
                { kind: 'block', type: 'motion_turnleft' }, { kind: 'block', type: 'motion_goto' },
                { kind: 'block', type: 'motion_gotoxy' }, { kind: 'block', type: 'motion_glide' },
                { kind: 'block', type: 'motion_pointdir' }, { kind: 'block', type: 'motion_pointtowards' },
                { kind: 'block', type: 'motion_changex' }, { kind: 'block', type: 'motion_setx' },
                { kind: 'block', type: 'motion_changey' }, { kind: 'block', type: 'motion_sety' },
                { kind: 'block', type: 'motion_ifonedgebounce' }, { kind: 'block', type: 'motion_setrotationstyle' },
            ]},
            { kind: 'category', name: 'Apariencia', colour: '#9966FF', blocks: [
                { kind: 'block', type: 'looks_say' }, { kind: 'block', type: 'looks_sayforever' },
                { kind: 'block', type: 'looks_think' }, { kind: 'block', type: 'looks_thinkforever' },
                { kind: 'block', type: 'looks_switchcostume' }, { kind: 'block', type: 'looks_nextcostume' },
                { kind: 'block', type: 'looks_switchbg' }, { kind: 'block', type: 'looks_changesize' },
                { kind: 'block', type: 'looks_setsize' }, { kind: 'block', type: 'looks_changeeffect' },
                { kind: 'block', type: 'looks_seteffect' }, { kind: 'block', type: 'looks_cleareffects' },
                { kind: 'block', type: 'looks_show' }, { kind: 'block', type: 'looks_hide' },
            ]},
            { kind: 'category', name: 'Sonido', colour: '#CF63CF', blocks: [
                { kind: 'block', type: 'sound_play' }, { kind: 'block', type: 'sound_playuntil' },
                { kind: 'block', type: 'sound_stopall' }, { kind: 'block', type: 'sound_changevolume' },
                { kind: 'block', type: 'sound_setvolume' },
            ]},
            { kind: 'category', name: 'Eventos', colour: '#FFBF00', blocks: [
                { kind: 'block', type: 'events_whenflag' }, { kind: 'block', type: 'events_whenkey' },
                { kind: 'block', type: 'events_whenclicked' }, { kind: 'block', type: 'events_whenbgchange' },
                { kind: 'block', type: 'events_broadcast' }, { kind: 'block', type: 'events_broadcastwait' },
                { kind: 'block', type: 'events_whenreceive' },
            ]},
            { kind: 'category', name: 'Control', colour: '#FFAB19', blocks: [
                { kind: 'block', type: 'control_wait' }, { kind: 'block', type: 'control_repeat' },
                { kind: 'block', type: 'control_forever' }, { kind: 'block', type: 'control_if' },
                { kind: 'block', type: 'control_ifelse' }, { kind: 'block', type: 'control_waituntil' },
                { kind: 'block', type: 'control_repeatuntil' }, { kind: 'block', type: 'control_stop' },
                { kind: 'block', type: 'control_clone' }, { kind: 'block', type: 'control_deleteclone' },
            ]},
            { kind: 'category', name: 'Sensores', colour: '#5CB1D6', blocks: [
                { kind: 'block', type: 'sensing_touchingmouse' }, { kind: 'block', type: 'sensing_touchingedge' },
                { kind: 'block', type: 'sensing_keypressed' }, { kind: 'block', type: 'sensing_mousedown' },
                { kind: 'block', type: 'sensing_mousex' }, { kind: 'block', type: 'sensing_mousey' },
                { kind: 'block', type: 'sensing_timer' }, { kind: 'block', type: 'sensing_resettimer' },
                { kind: 'block', type: 'sensing_username' },
            ]},
            { kind: 'category', name: 'Operadores', colour: '#59C059', blocks: [
                { kind: 'block', type: 'operators_add' }, { kind: 'block', type: 'operators_sub' },
                { kind: 'block', type: 'operators_mul' }, { kind: 'block', type: 'operators_div' },
                { kind: 'block', type: 'operators_random' }, { kind: 'block', type: 'operators_gt' },
                { kind: 'block', type: 'operators_lt' }, { kind: 'block', type: 'operators_eq' },
                { kind: 'block', type: 'operators_and' }, { kind: 'block', type: 'operators_or' },
                { kind: 'block', type: 'operators_not' }, { kind: 'block', type: 'operators_join' },
                { kind: 'block', type: 'operators_letterof' }, { kind: 'block', type: 'operators_length' },
                { kind: 'block', type: 'operators_contains' }, { kind: 'block', type: 'operators_mod' },
                { kind: 'block', type: 'operators_round' }, { kind: 'block', type: 'operators_sqrt' },
            ]},
            { kind: 'category', name: 'Variables', colour: '#FF8C1A', blocks: [
                { kind: 'block', type: 'variables_set' }, { kind: 'block', type: 'variables_change' },
                { kind: 'block', type: 'variables_get' },
            ]},
            { kind: 'category', name: 'Mis Bloques', colour: '#FF6680', blocks: [
                { kind: 'block', type: 'myblocks_define' }, { kind: 'block', type: 'myblocks_call' },
            ]},
        ]
    };

    const workspace = Blockly.inject('blocklyDiv', {
        toolbox: toolbox,
        scrollbars: true,
        trashcan: true,
        zoom: { controls: true, wheel: true },
        grid: { spacing: 20, length: 3, colour: '#333', snap: true },
        theme: Blockly.Theme.defineTheme('dark', {
            base: Blockly.Themes.Classic,
            componentStyles: {
                workspaceBackgroundColour: '#1e1e35',
                toolboxBackgroundColour: '#16213e',
                toolboxForegroundColour: '#ddd',
                flyoutBackgroundColour: '#1a1a2e',
                flyoutForegroundColour: '#ccc',
                scrollbarColour: '#444',
            },
        }),
    });

    // ==================== SPRITE & STAGE ====================
    const canvas = document.getElementById('stage-canvas');
    const ctx = canvas.getContext('2d');
    const stageW = 480, stageH = 360;
    let sprite = { x:0, y:0, direction:90, size:100, visible:true, sayText:'', sayTimer:0, thinkText:'', thinkTimer:0,
        effects:{color:0, ghost:0}, penDown:false, penColor:'#000', penSize:2 };
    let stageBackground = 1;
    let mouseX = stageW/2, mouseY = stageH/2, mouseDown = false;
    let keysPressed = new Set();
    let broadcastQueue = [];
    let runAbort = false, isRunning = false;
    let timerStart = Date.now();
    let variables = { miVar:0 };
    let lists = {};

    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouseX = (e.clientX - rect.left) * (stageW / rect.width);
        mouseY = (e.clientY - rect.top) * (stageH / rect.height);
    });
    canvas.addEventListener('mousedown', () => mouseDown = true);
    canvas.addEventListener('mouseup', () => mouseDown = false);
    canvas.addEventListener('mouseleave', () => mouseDown = false);
    document.addEventListener('keydown', e => { keysPressed.add(e.key); keysPressed.add(e.key.toLowerCase()); });
    document.addEventListener('keyup', e => { keysPressed.delete(e.key); keysPressed.delete(e.key.toLowerCase()); });

    function drawStage() {
        ctx.clearRect(0,0,stageW,stageH);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0,0,stageW,stageH);
        if (!sprite.visible) return;
        ctx.save();
        const cx = stageW/2 + sprite.x;
        const cy = stageH/2 - sprite.y;
        ctx.translate(cx, cy);
        ctx.rotate((sprite.direction-90)*Math.PI/180);
        const s = 30 * (sprite.size/100);
        ctx.fillStyle = '#ff8c42';
        ctx.beginPath(); ctx.arc(0,0,s*0.7,0,2*Math.PI); ctx.fill();
        ctx.fillStyle = '#ffaa66';
        ctx.beginPath(); ctx.arc(0,-s*0.7,s*0.5,0,2*Math.PI); ctx.fill();
        ctx.restore();
        if (sprite.sayText && sprite.sayTimer>0) drawBubble(cx, cy-45, sprite.sayText);
    }
    function drawBubble(x,y,text) {
        ctx.save(); ctx.fillStyle='#fff'; ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
        const w=Math.max(60,text.length*8+20), h=28;
        ctx.beginPath(); ctx.roundRect(x-w/2,y-h,w,h,8); ctx.fill(); ctx.stroke();
        ctx.fillStyle='#222'; ctx.font='11px sans-serif';
        ctx.fillText(text, x-w/2+10, y-h+18);
        ctx.restore();
    }
    function updateVarDisplay() {
        const div = document.getElementById('variable-display');
        let html = '';
        for (const [k,v] of Object.entries(variables)) html += `<span class="var-item"><strong>${k}</strong>: ${v}</span>`;
        div.innerHTML = html || '<span style="color:#888">Sin variables</span>';
    }
    function log(msg) {
        const c = document.getElementById('output-console');
        c.textContent += '\n' + msg;
        c.scrollTop = c.scrollHeight;
    }
    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent=msg; t.classList.add('show');
        clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'),1800);
    }

    // ==================== INTÉRPRETE ====================
    async function evaluateBlock(block) {
        if (runAbort) return;
        const type = block.type;
        const getField = (name, def) => block.getFieldValue(name) ?? def;
        // Movimiento
        if (type==='motion_movesteps') {
            const steps = parseFloat(getField('STEPS',10));
            sprite.x += Math.cos(sprite.direction*Math.PI/180)*steps;
            sprite.y += Math.sin(sprite.direction*Math.PI/180)*steps;
        } else if (type==='motion_turnright') sprite.direction += parseFloat(getField('DEGREES',15));
        else if (type==='motion_turnleft') sprite.direction -= parseFloat(getField('DEGREES',15));
        else if (type==='motion_goto') {
            sprite.x = (Math.random()-0.5)*stageW*0.8;
            sprite.y = (Math.random()-0.5)*stageH*0.8;
        } else if (type==='motion_gotoxy') {
            sprite.x = parseFloat(getField('X',0));
            sprite.y = parseFloat(getField('Y',0));
        } else if (type==='motion_glide') {
            const secs = parseFloat(getField('SECS',1));
            const tx = parseFloat(getField('X',0));
            const ty = parseFloat(getField('Y',0));
            const sx = sprite.x, sy = sprite.y;
            const steps = Math.max(1, Math.round(secs*30));
            for (let i=1; i<=steps && !runAbort; i++) {
                sprite.x = sx + (tx-sx)*(i/steps);
                sprite.y = sy + (ty-sy)*(i/steps);
                drawStage();
                await sleep(secs*1000/steps);
            }
        } else if (type==='motion_pointdir') sprite.direction = parseFloat(getField('DIR',90));
        else if (type==='motion_changex') sprite.x += parseFloat(getField('DX',10));
        else if (type==='motion_setx') sprite.x = parseFloat(getField('X',0));
        else if (type==='motion_changey') sprite.y += parseFloat(getField('DY',10));
        else if (type==='motion_sety') sprite.y = parseFloat(getField('Y',0));
        else if (type==='motion_ifonedgebounce') {
            if (Math.abs(sprite.x)>stageW/2-5) { sprite.direction = 180-sprite.direction; sprite.x = Math.sign(sprite.x)*(stageW/2-5); }
            if (Math.abs(sprite.y)>stageH/2-5) { sprite.direction = -sprite.direction; sprite.y = Math.sign(sprite.y)*(stageH/2-5); }
        }
        // Apariencia
        else if (type==='looks_say') {
            sprite.sayText = getField('TEXT','Hola');
            sprite.sayTimer = parseFloat(getField('SECS',2));
            await sleep(parseFloat(getField('SECS',2))*1000);
            sprite.sayText=''; sprite.sayTimer=0;
        } else if (type==='looks_sayforever') { sprite.sayText = getField('TEXT','Hola'); sprite.sayTimer=9999; }
        else if (type==='looks_setsize') sprite.size = Math.max(5,Math.min(500, parseFloat(getField('SIZE',100))));
        else if (type==='looks_changesize') sprite.size = Math.max(5,Math.min(500, sprite.size+parseFloat(getField('DSIZE',10))));
        else if (type==='looks_show') sprite.visible = true;
        else if (type==='looks_hide') sprite.visible = false;
        // Eventos
        else if (type==='events_broadcast') broadcastQueue.push(getField('MESSAGE','mensaje1'));
        // Control
        else if (type==='control_wait') await sleep(parseFloat(getField('SECS',1))*1000);
        else if (type==='control_repeat') {
            const times = parseInt(getField('TIMES',10));
            const doBlock = block.getInputTargetBlock('DO');
            for (let i=0; i<times && !runAbort; i++) if (doBlock) await executeStack(doBlock);
        } else if (type==='control_forever') {
            const doBlock = block.getInputTargetBlock('DO');
            while (!runAbort) { if (doBlock) await executeStack(doBlock); await sleep(30); }
        } else if (type==='control_if') {
            if (getField('COND','TRUE')==='TRUE') {
                const doBlock = block.getInputTargetBlock('DO');
                if (doBlock) await executeStack(doBlock);
            }
        } else if (type==='control_stop') runAbort = true;
        // Sensores
        else if (type==='sensing_resettimer') timerStart = Date.now();
        // Variables
        else if (type==='variables_set') variables[getField('VAR','miVar')] = parseFloat(getField('VAL',0));
        else if (type==='variables_change') {
            const v = getField('VAR','miVar');
            if (!(v in variables)) variables[v]=0;
            variables[v] += parseFloat(getField('DVAL',1));
        }
        drawStage(); updateVarDisplay();
    }

    async function executeStack(firstBlock) {
        let block = firstBlock;
        while (block && !runAbort) {
            await evaluateBlock(block);
            block = block.getNextBlock();
        }
    }

    async function runAllHatBlocks() {
        runAbort = false; isRunning = true; broadcastQueue = []; timerStart = Date.now();
        const tops = workspace.getTopBlocks(true);
        for (const hat of tops) {
            if (hat.type==='events_whenflag' && !runAbort) {
                const next = hat.getNextBlock();
                if (next) await executeStack(next);
            }
        }
        while (broadcastQueue.length && !runAbort) {
            const msg = broadcastQueue.shift();
            for (const hat of tops) {
                if (hat.type==='events_whenreceive' && hat.getFieldValue('MESSAGE')===msg && !runAbort) {
                    const next = hat.getNextBlock();
                    if (next) await executeStack(next);
                }
            }
        }
        isRunning = false;
        log(runAbort ? '⏹ Detenido' : '✅ Ejecución completada');
    }

    function runProject() {
        if (isRunning) stopProject();
        runAllHatBlocks();
    }
    function stopProject() {
        runAbort = true; isRunning = false;
        sprite.sayText=''; sprite.sayTimer=0;
    }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ==================== GUARDAR / CARGAR ====================
    function saveProject() {
        const xml = Blockly.Xml.workspaceToDom(workspace);
        const data = {
            xml: Blockly.Xml.domToText(xml),
            sprite, stageBackground, variables, lists
        };
        const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'BlockIngenier.json';
        a.click();
        toast('💾 Proyecto guardado');
    }
    function loadProject() {
        const input = document.createElement('input');
        input.type='file'; input.accept='.json';
        input.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const data = JSON.parse(ev.target.result);
                workspace.clear();
                if (data.xml) Blockly.Xml.domToWorkspace(Blockly.Xml.textToDom(data.xml), workspace);
                if (data.sprite) Object.assign(sprite, data.sprite);
                if (data.stageBackground) stageBackground = data.stageBackground;
                if (data.variables) variables = data.variables;
                if (data.lists) lists = data.lists;
                drawStage(); updateVarDisplay();
                toast('📂 Proyecto cargado');
            };
            reader.readAsText(file);
        };
        input.click();
    }
    function clearWorkspace() {
        if (isRunning) stopProject();
        workspace.clear();
        toast('🗑 Área limpiada');
    }

    // Demo inicial
    function init() {
        drawStage(); updateVarDisplay();
        const demoXml = `<xml xmlns="https://developers.google.com/blockly/xml">
            <block type="events_whenflag" x="30" y="30">
                <next>
                    <block type="motion_gotoxy">
                        <field name="X">0</field><field name="Y">0</field>
                        <next>
                            <block type="looks_say">
                                <field name="TEXT">¡Hola BlockIngenier!</field>
                                <field name="SECS">2</field>
                                <next>
                                    <block type="control_repeat">
                                        <field name="TIMES">4</field>
                                        <statement name="DO">
                                            <block type="motion_movesteps">
                                                <field name="STEPS">30</field>
                                                <next>
                                                    <block type="motion_turnright">
                                                        <field name="DEGREES">90</field>
                                                    </block>
                                                </next>
                                            </block>
                                        </statement>
                                    </block>
                                </next>
                            </block>
                        </next>
                    </block>
                </next>
            </block>
        </xml>`;
        Blockly.Xml.domToWorkspace(Blockly.Xml.textToDom(demoXml), workspace);
        log('🧩 BlockIngenier listo. Usa los bloques de la izquierda.');
    }
    init();

    function animationLoop() {
        if (sprite.sayTimer>0 && sprite.sayTimer<9999) sprite.sayTimer -= 0.03;
        drawStage(); updateVarDisplay();
        requestAnimationFrame(animationLoop);
    }
    animationLoop();
</script>
