        // --- Build Sidebar ---
        function buildSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = '';
            categories.forEach(cat => {
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `<span class="dot" style="background:${cat.dot}"></span>${cat.name}`;
                header.onclick = () => {
                    const blocksDiv = header.nextElementSibling;
                    blocksDiv.classList.toggle('collapsed');
                };
                sidebar.appendChild(header);

                const blocksDiv = document.createElement('div');
                blocksDiv.className = 'category-blocks';
                cat.blocks.forEach(blockDef => {
                    const div = document.createElement('div');
                    div.className = 'palette-block';
                    div.style.background = cat.color;
                    div.textContent = blockDef.label;
                    div.title = blockDef.type;
                    div.draggable = true;
                    div.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData('text/plain', JSON.stringify({
                            categoryId: cat.id,
                            blockType: blockDef.type,
                            label: blockDef.label,
                            shape: blockDef.shape,
                            defaultParams: blockDef.defaultParams || {},
                            color: cat.color,
                        }));
                        e.dataTransfer.effectAllowed = 'copy';
                    });
                    blocksDiv.appendChild(div);
                });
                sidebar.appendChild(blocksDiv);
            });
        }

        // --- Workspace Block Creation ---
        function createWorkspaceBlock(blockType, label, shape, color, params, x, y) {
            const id = 'b' + (++blockIdCounter);
            const div = document.createElement('div');
            div.className = 'ws-block';
            div.style.background = color;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.dataset.blockId = id;
            div.dataset.blockType = blockType;
            div.dataset.shape = shape;
            div.dataset.color = color;
            div.textContent = label;
            div.title = blockType + ' | ID: ' + id;

            if (shape === 'hat') {
                div.classList.add('hat-block');
            } else if (shape === 'cblock') {
                div.classList.add('c-block');
                const inner = document.createElement('div');
                inner.className = 'inner-area';
                inner.dataset.innerFor = id;
                div.appendChild(inner);
                div.textContent = label;
                div.appendChild(inner);
            } else if (shape === 'reporter') {
                div.classList.add('reporter-block');
            } else if (shape === 'boolean') {
                div.classList.add('boolean-block');
            }

            if (shape !== 'hat') {
                const topNotch = document.createElement('div');
                topNotch.className = 'block-top-notch';
                topNotch.style.background = color;
                div.appendChild(topNotch);
            }
            if (shape !== 'reporter' && shape !== 'boolean') {
                const notch = document.createElement('div');
                notch.className = 'block-notch';
                notch.style.background = color;
                div.appendChild(notch);
            }

            // Store params
            div._params = JSON.parse(JSON.stringify(params || {}));
            div._nextBlockId = null;
            div._prevBlockId = null;
            div._parentCBlockId = null;
            div._innerBlockIds = [];

            // Mouse events for dragging in workspace
            div.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    e.stopPropagation();
                    selectBlock(id);
                    if (!isRunning) {
                        isDragging = true;
                        dragTarget = div;
                        const rect = div.getBoundingClientRect();
                        const wsRect = document.getElementById('workspace').getBoundingClientRect();
                        dragOffsetX = e.clientX - rect.left;
                        dragOffsetY = e.clientY - rect.top;
                        div.style.zIndex = 70;
                        div.style.cursor = 'grabbing';
                    }
                }
                if (e.button === 2) {
                    e.preventDefault();
                    e.stopPropagation();
                    selectBlock(id);
                    showContextMenu(e.clientX, e.clientY);
                }
            });
            div.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                selectBlock(id);
                showContextMenu(e.clientX, e.clientY);
            });

            document.getElementById('workspace').appendChild(div);
            workspaceBlocks[id] = { div, blockType, shape, color, params: div._params, nextBlockId: null,
                prevBlockId: null, parentCBlockId: null, innerBlockIds: [] };
            return id;
        }

        function selectBlock(id) {
            // Deselect all
            Object.values(workspaceBlocks).forEach(b => b.div.classList.remove('selected'));
            selectedBlockId = id;
            if (id && workspaceBlocks[id]) {
                workspaceBlocks[id].div.classList.add('selected');
            }
        }

        function showContextMenu(x, y) {
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            setTimeout(() => {
                const hide = () => { menu.style.display = 'none';
                    document.removeEventListener('click', hide); };
                document.addEventListener('click', hide);
            }, 50);
        }

        function duplicateBlock() {
            if (!selectedBlockId || !workspaceBlocks[selectedBlockId]) return;
            const b = workspaceBlocks[selectedBlockId];
            const div = b.div;
            const x = parseInt(div.style.left) + 30;
            const y = parseInt(div.style.top) + 30;
            const newId = createWorkspaceBlock(b.blockType, div.textContent.replace(/[\d.]+/g, (m) => m), b.shape, b
                .color, b.params, x, y);
            toast('Bloque duplicado');
        }

        function deleteSelectedBlock() {
            if (!selectedBlockId || !workspaceBlocks[selectedBlockId]) return;
            removeBlock(selectedBlockId);
            selectedBlockId = null;
            document.getElementById('context-menu').style.display = 'none';
            toast('Bloque eliminado');
        }

        function disconnectBlock() {
            if (!selectedBlockId || !workspaceBlocks[selectedBlockId]) return;
            const b = workspaceBlocks[selectedBlockId];
            if (b.prevBlockId && workspaceBlocks[b.prevBlockId]) {
                workspaceBlocks[b.prevBlockId].nextBlockId = null;
                workspaceBlocks[b.prevBlockId].div._nextBlockId = null;
            }
            if (b.parentCBlockId && workspaceBlocks[b.parentCBlockId]) {
                const parent = workspaceBlocks[b.parentCBlockId];
                parent.innerBlockIds = parent.innerBlockIds.filter(i => i !== selectedBlockId);
                parent.div._innerBlockIds = parent.innerBlockIds;
            }
            b.prevBlockId = null;
            b.parentCBlockId = null;
            b.div._prevBlockId = null;
            b.div._parentCBlockId = null;
            workspaceBlocks[selectedBlockId] = b;
            toast('Bloque desconectado');
        }

        function removeBlock(id) {
            const b = workspaceBlocks[id];
            if (!b) return;
            // Disconnect from chain
            if (b.prevBlockId && workspaceBlocks[b.prevBlockId]) {
                workspaceBlocks[b.prevBlockId].nextBlockId = b.nextBlockId;
                workspaceBlocks[b.prevBlockId].div._nextBlockId = b.nextBlockId;
            }
            if (b.nextBlockId && workspaceBlocks[b.nextBlockId]) {
                workspaceBlocks[b.nextBlockId].prevBlockId = b.prevBlockId;
                workspaceBlocks[b.nextBlockId].div._prevBlockId = b.prevBlockId;
            }
            if (b.parentCBlockId && workspaceBlocks[b.parentCBlockId]) {
                const parent = workspaceBlocks[b.parentCBlockId];
                parent.innerBlockIds = parent.innerBlockIds.filter(i => i !== id);
                parent.div._innerBlockIds = parent.innerBlockIds;
            }
            // Remove inner blocks
            if (b.innerBlockIds) {
                [...b.innerBlockIds].forEach(innerId => removeBlock(innerId));
            }
            // Remove from DOM
            if (b.div && b.div.parentNode) b.div.parentNode.removeChild(b.div);
            delete workspaceBlocks[id];
            if (selectedBlockId === id) selectedBlockId = null;
        }

        // --- Snap detection ---
        function snapBlocks(draggedId, targetId) {
            const dragged = workspaceBlocks[draggedId];
            const target = workspaceBlocks[targetId];
            if (!dragged || !target) return false;
            if (draggedId === targetId) return false;
            if (dragged.shape === 'hat' && target.shape !== 'stack' && target.shape !== 'cblock' && target.shape !==
                'hat') return false;

            const dDiv = dragged.div;
            const tDiv = target.div;
            const dRect = dDiv.getBoundingClientRect();
            const tRect = tDiv.getBoundingClientRect();

            const dCenterX = dRect.left + dRect.width / 2;
            const dBottom = dRect.bottom;
            const tTop = tRect.top;
            const tCenterX = tRect.left + tRect.width / 2;

            const vertDist = Math.abs(dBottom - tTop);
            const horizDist = Math.abs(dCenterX - tCenterX);

            if (vertDist < 18 && horizDist < 50 && dragged.shape !== 'reporter' && dragged.shape !== 'boolean') {
                // Snap: dragged goes above target
                if (target.prevBlockId && workspaceBlocks[target.prevBlockId]) {
                    const oldPrev = workspaceBlocks[target.prevBlockId];
                    oldPrev.nextBlockId = null;
                    oldPrev.div._nextBlockId = null;
                }
                dragged.nextBlockId = targetId;
                dragged.div._nextBlockId = targetId;
                target.prevBlockId = draggedId;
                target.div._prevBlockId = draggedId;
                workspaceBlocks[draggedId] = dragged;
                workspaceBlocks[targetId] = target;
                // Reposition
                const newY = parseInt(tDiv.style.top) - dDiv.offsetHeight + 2;
                dDiv.style.top = newY + 'px';
                dDiv.style.left = tDiv.style.left;
                return true;
            }

            // Check if dropping inside a c-block
            if (target.shape === 'cblock') {
                const innerArea = tDiv.querySelector('.inner-area');
                if (innerArea) {
                    const iRect = innerArea.getBoundingClientRect();
                    if (dCenterX > iRect.left && dCenterX < iRect.right && dBottom > iRect.top && dRect.top < iRect
                        .bottom) {
                        if (dragged.prevBlockId && workspaceBlocks[dragged.prevBlockId]) {
                            workspaceBlocks[dragged.prevBlockId].nextBlockId = null;
                            workspaceBlocks[dragged.prevBlockId].div._nextBlockId = null;
                        }
                        dragged.prevBlockId = null;
                        dragged.parentCBlockId = targetId;
                        dragged.div._prevBlockId = null;
                        dragged.div._parentCBlockId = targetId;
                        if (!target.innerBlockIds.includes(draggedId)) {
                            target.innerBlockIds.push(draggedId);
                            target.div._innerBlockIds = target.innerBlockIds;
                        }
                        workspaceBlocks[draggedId] = dragged;
                        workspaceBlocks[targetId] = target;
                        dDiv.style.left = (parseInt(tDiv.style.left) + 20) + 'px';
                        dDiv.style.top = (parseInt(tDiv.style.top) + 30) + 'px';
                        return true;
                    }
                }
            }
            return false;
        }

        // --- Global mouse/touch events for workspace dragging ---
        document.addEventListener('mousemove', (e) => {
            if (isDragging && dragTarget && !isRunning) {
                const ws = document.getElementById('workspace');
                const wsRect = ws.getBoundingClientRect();
                const wsScrollLeft = document.getElementById('workspace-container').scrollLeft;
                const wsScrollTop = document.getElementById('workspace-container').scrollTop;
                const newX = e.clientX - wsRect.left + wsScrollLeft - dragOffsetX;
                const newY = e.clientY - wsRect.top + wsScrollTop - dragOffsetY;
                dragTarget.style.left = Math.max(0, newX) + 'px';
                dragTarget.style.top = Math.max(0, newY) + 'px';
            }
        });
        document.addEventListener('mouseup', (e) => {
            if (isDragging && dragTarget && !isRunning) {
                const draggedId = dragTarget.dataset.blockId;
                // Check snap with nearby blocks
                let snapped = false;
                const allIds = Object.keys(workspaceBlocks);
                for (const tid of allIds) {
                    if (tid === draggedId) continue;
                    if (snapBlocks(draggedId, tid)) {
                        snapped = true;
                        break;
                    }
                }
                dragTarget.style.cursor = 'grab';
                dragTarget.style.zIndex = 10;
                isDragging = false;
                dragTarget = null;
                updateStageInfo();
            }
        });

        // --- Workspace drop from palette ---
        document.getElementById('workspace-container').addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
        });
        document.getElementById('workspace-container').addEventListener('drop', (e) => {
            e.preventDefault();
            const wsContainer = document.getElementById('workspace-container');
            const ws = document.getElementById('workspace');
            const wsRect = ws.getBoundingClientRect();
            const scrollLeft = wsContainer.scrollLeft;
            const scrollTop = wsContainer.scrollTop;
            const x = e.clientX - wsRect.left + scrollLeft;
            const y = e.clientY - wsRect.top + scrollTop;
            try {
                const data = JSON.parse(e.dataTransfer.getData('text/plain'));
                const id = createWorkspaceBlock(data.blockType, data.label, data.shape, data.color, data
                    .defaultParams, Math.max(0, x), Math.max(0, y));
                selectBlock(id);
                toast('Bloque añadido: ' + data.label);
            } catch (err) {
                // Ignore
            }
        });

        // --- Workspace click to deselect ---
        document.getElementById('workspace').addEventListener('mousedown', function(e) {
            if (e.target === this) {
                selectBlock(null);
                document.getElementById('context-menu').style.display = 'none';
            }
        });

        // --- Stage Canvas ---
        const stageCanvas = document.getElementById('stage-canvas');
        const stageCtx = stageCanvas.getContext('2d');

        function drawStage() {
            stageCtx.clearRect(0, 0, stageWidth, stageHeight);
            // Background
            const bgColors = ['#ffffff', '#e8f4f8', '#fef9e7', '#e8f8e8', '#fce4ec'];
            stageCtx.fillStyle = bgColors[(stageBackground - 1) % bgColors.length] || '#ffffff';
            stageCtx.fillRect(0, 0, stageWidth, stageHeight);

            // Grid
            stageCtx.strokeStyle = '#ddd';
            stageCtx.lineWidth = 0.5;
            for (let gx = 0; gx < stageWidth; gx += 40) {
                stageCtx.beginPath();
                stageCtx.moveTo(gx, 0);
                stageCtx.lineTo(gx, stageHeight);
                stageCtx.stroke();
            }
            for (let gy = 0; gy < stageHeight; gy += 40) {
                stageCtx.beginPath();
                stageCtx.moveTo(0, gy);
                stageCtx.lineTo(stageWidth, gy);
                stageCtx.stroke();
            }

            if (!sprite.visible) return;

            // Apply effects (simplified)
            stageCtx.save();
            const cx = stageWidth / 2 + sprite.x;
            const cy = stageHeight / 2 - sprite.y;
            const sizeFactor = sprite.size / 100;

            stageCtx.translate(cx, cy);
            if (sprite.rotationStyle === 'all') {
                stageCtx.rotate((sprite.direction - 90) * Math.PI / 180);
            } else if (sprite.rotationStyle === 'left-right') {
                if (sprite.direction < 0) stageCtx.scale(-1, 1);
            }
            stageCtx.scale(sizeFactor, sizeFactor);

            // Ghost effect
            const ghostAlpha = 1 - (sprite.effects.ghost || 0) / 100;
            stageCtx.globalAlpha = Math.max(0, Math.min(1, ghostAlpha));

            // Draw sprite (cat-like shape)
            const s = 30;
            // Body
            stageCtx.fillStyle = '#ff8c42';
            stageCtx.beginPath();
            stageCtx.arc(0, 0, s * 0.7, 0, Math.PI * 2);
            stageCtx.fill();
            stageCtx.strokeStyle = '#333';
            stageCtx.lineWidth = 2;
            stageCtx.stroke();
            // Head
            stageCtx.fillStyle = '#ffaa66';
            stageCtx.beginPath();
            stageCtx.arc(0, -s * 0.7, s * 0.5, 0, Math.PI * 2);
            stageCtx.fill();
            stageCtx.stroke();
            // Ears
            stageCtx.fillStyle = '#ff8c42';
            stageCtx.beginPath();
            stageCtx.moveTo(-s * 0.3, -s * 1.1);
            stageCtx.lineTo(-s * 0.15, -s * 1.6);
            stageCtx.lineTo(0, -s * 1.0);
            stageCtx.fill();
            stageCtx.beginPath();
            stageCtx.moveTo(s * 0.3, -s * 1.1);
            stageCtx.lineTo(s * 0.15, -s * 1.6);
            stageCtx.lineTo(0, -s * 1.0);
            stageCtx.fill();
            // Eyes
            stageCtx.fillStyle = '#fff';
            stageCtx.beginPath();
            stageCtx.arc(-s * 0.15, -s * 0.75, s * 0.13, 0, Math.PI * 2);
            stageCtx.fill();
            stageCtx.beginPath();
            stageCtx.arc(s * 0.15, -s * 0.75, s * 0.13, 0, Math.PI * 2);
            stageCtx.fill();
            stageCtx.fillStyle = '#111';
            stageCtx.beginPath();
            stageCtx.arc(-s * 0.13, -s * 0.73, s * 0.06, 0, Math.PI * 2);
            stageCtx.fill();
            stageCtx.beginPath();
            stageCtx.arc(s * 0.17, -s * 0.73, s * 0.06, 0, Math.PI * 2);
            stageCtx.fill();
            // Nose
            stageCtx.fillStyle = '#ff6b8a';
            stageCtx.beginPath();
            stageCtx.arc(0, -s * 0.58, s * 0.07, 0, Math.PI * 2);
            stageCtx.fill();
            // Tail
            stageCtx.strokeStyle = '#ff8c42';
            stageCtx.lineWidth = 3;
            stageCtx.beginPath();
            stageCtx.moveTo(s * 0.5, s * 0.2);
            stageCtx.quadraticCurveTo(s * 1.2, -s * 0.3, s * 0.9, -s * 0.9);
            stageCtx.stroke();

            stageCtx.restore();

            // Say/Think bubbles
            if (sprite.sayText && sprite.sayTimer > 0) {
                drawBubble(cx, cy - 45 * sizeFactor, sprite.sayText, false);
            }
            if (sprite.thinkText && sprite.thinkTimer > 0) {
                drawBubble(cx, cy - 45 * sizeFactor, sprite.thinkText, true);
            }

            // Pen trail (if pen is down, draw a dot at current position)
            if (sprite.penDown) {
                stageCtx.fillStyle = sprite.penColor;
                stageCtx.beginPath();
                stageCtx.arc(cx, cy, sprite.penSize, 0, Math.PI * 2);
                stageCtx.fill();
            }
        }

        function drawBubble(x, y, text, isThink) {
            stageCtx.save();
            stageCtx.fillStyle = '#fff';
            stageCtx.strokeStyle = '#333';
            stageCtx.lineWidth = 1.5;
            const w = Math.max(60, text.length * 8 + 20);
            const h = 28;
            const bx = x - w / 2;
            const by = y - h;
            stageCtx.beginPath();
            stageCtx.roundRect(bx, by, w, h, 8);
            stageCtx.fill();
            stageCtx.stroke();
            if (isThink) {
                stageCtx.fillStyle = '#fff';
                stageCtx.beginPath();
                stageCtx.arc(bx + 10, y + 4, 5, 0, Math.PI * 2);
                stageCtx.fill();
                stageCtx.stroke();
                stageCtx.beginPath();
                stageCtx.arc(bx + 4, y + 12, 3, 0, Math.PI * 2);
                stageCtx.fill();
                stageCtx.stroke();
            } else {
                stageCtx.fillStyle = '#fff';
                stageCtx.beginPath();
                stageCtx.moveTo(bx + 12, y);
                stageCtx.lineTo(bx + 8, y + 10);
                stageCtx.lineTo(bx + 20, y);
                stageCtx.fill();
                stageCtx.stroke();
            }
            stageCtx.fillStyle = '#222';
            stageCtx.font = '11px "Segoe UI", sans-serif';
            stageCtx.fillText(text, bx + 10, by + 18);
            stageCtx.restore();
        }

        function updateStageInfo() {
            document.getElementById('sprite-x').textContent = Math.round(sprite.x);
            document.getElementById('sprite-y').textContent = Math.round(sprite.y);
            document.getElementById('sprite-dir').textContent = Math.round(sprite.direction) + '°';
            document.getElementById('sprite-size').textContent = Math.round(sprite.size) + '%';
            updateVariableDisplay();
            drawStage();
        }

        function updateVariableDisplay() {
            const div = document.getElementById('variable-display');
            let html = '';
            for (const [name, val] of Object.entries(variables)) {
                html +=
                    `<span class="var-item"><strong>${name}</strong>: ${typeof val === 'number' ? Math.round(val*100)/100 : val}</span>`;
            }
            for (const [name, arr] of Object.entries(lists)) {
                html +=
                    `<span class="var-item"><strong>📋 ${name}</strong>: [${arr.length} items] ${arr.slice(0,3).join(', ')}${arr.length>3?'...':''}</span>`;
            }
            div.innerHTML = html || '<span style="color:#888;">Sin variables definidas</span>';
        }

        function log(msg) {
            const consoleDiv = document.getElementById('output-console');
            consoleDiv.textContent += '\n' + msg;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            // Keep last 200 chars
            if (consoleDiv.textContent.length > 600) {
                consoleDiv.textContent = '...' + consoleDiv.textContent.slice(-500);
            }
        }

        // --- Sound Engine (Web Audio API) ---
        let audioCtx = null;
        let masterVolume = 0.5;

        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playBeep(freq = 440, duration = 0.2, type = 'square') {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(masterVolume * 0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + duration);
            } catch (e) {
                // Audio not available
            }
        }

        function playSoundEffect(name) {
            const sounds = {
                'pop': () => playBeep(600, 0.15, 'square'),
                'meow': () => { playBeep(400, 0.3, 'triangle');
                    setTimeout(() => playBeep(500, 0.2, 'triangle'), 150); },
                'chirp': () => playBeep(800, 0.1, 'sine'),
                'boing': () => { playBeep(200, 0.2, 'sawtooth');
                    playBeep(300, 0.15, 'sawtooth'); },
                'click': () => playBeep(1000, 0.05, 'square'),
            };
            if (sounds[name]) sounds[name]();
            else playBeep(440, 0.2, 'square');
        }

        // --- Timer ---
        let timerStart = Date.now();

        function resetTimer() { timerStart = Date.now(); }

        function getTimer() { return (Date.now() - timerStart) / 1000; }

        // --- Block Execution Engine ---
        function getStack(startBlockId) {
            // Build ordered list from startBlockId following nextBlockId chain
            const order = [];
            const visited = new Set();
            let current = startBlockId;
            while (current && workspaceBlocks[current] && !visited.has(current)) {
                visited.add(current);
                order.push(current);
                current = workspaceBlocks[current].nextBlockId;
            }
            return order;
        }

        function getInnerStack(cBlockId) {
            const b = workspaceBlocks[cBlockId];
            if (!b || !b.innerBlockIds || b.innerBlockIds.length === 0) return [];
            // Return the first inner block and its chain
            const firstInner = b.innerBlockIds[0];
            return getStack(firstInner);
        }

        async function executeBlock(blockId, context = {}) {
            if (runAbort) return { abort: true };
            const b = workspaceBlocks[blockId];
            if (!b) return { next: true };

            // Highlight running block
            const div = b.div;
            div.classList.add('running');
            setTimeout(() => div.classList.remove('running'), 400);

            const params = b.params || {};
            const bt = b.blockType;

            // --- MOTION ---
            if (bt === 'motion_movesteps') {
                const steps = parseFloat(params.steps) || 10;
                const rad = sprite.direction * Math.PI / 180;
                sprite.x += Math.cos(rad) * steps;
                sprite.y += Math.sin(rad) * steps;
                if (sprite.penDown) drawStage();
                updateStageInfo();
            } else if (bt === 'motion_turnright') {
                sprite.direction += parseFloat(params.degrees) || 15;
                updateStageInfo();
            } else if (bt === 'motion_turnleft') {
                sprite.direction -= parseFloat(params.degrees) || 15;
                updateStageInfo();
            } else if (bt === 'motion_goto') {
                sprite.x = (Math.random() - 0.5) * stageWidth * 0.8;
                sprite.y = (Math.random() - 0.5) * stageHeight * 0.8;
                updateStageInfo();
            } else if (bt === 'motion_gotoxy') {
                sprite.x = parseFloat(params.x) || 0;
                sprite.y = parseFloat(params.y) || 0;
                updateStageInfo();
            } else if (bt === 'motion_glide') {
                const secs = parseFloat(params.secs) || 1;
                const tx = parseFloat(params.x) || 0;
                const ty = parseFloat(params.y) || 0;
                const sx = sprite.x,
                    sy = sprite.y;
                const steps = Math.max(1, Math.round(secs * 30));
                for (let i = 1; i <= steps; i++) {
                    if (runAbort) return { abort: true };
                    sprite.x = sx + (tx - sx) * (i / steps);
                    sprite.y = sy + (ty - sy) * (i / steps);
                    updateStageInfo();
                    drawStage();
                    await sleep(secs * 1000 / steps);
                }
            } else if (bt === 'motion_pointdir') {
                sprite.direction = parseFloat(params.dir) || 90;
                updateStageInfo();
            } else if (bt === 'motion_pointtowards') {
                if (params.target === 'mouse') {
                    const mx = (mouseStageX || 0) - stageWidth / 2;
                    const my = (stageHeight / 2) - (mouseStageY || 0);
                    sprite.direction = Math.atan2(my - sprite.y, mx - sprite.x) * 180 / Math.PI;
                }
                updateStageInfo();
            } else if (bt === 'motion_changex') {
                sprite.x += parseFloat(params.dx) || 10;
                updateStageInfo();
            } else if (bt === 'motion_setx') {
                sprite.x = parseFloat(params.x) || 0;
                updateStageInfo();
            } else if (bt === 'motion_changey') {
                sprite.y += parseFloat(params.dy) || 10;
                updateStageInfo();
            } else if (bt === 'motion_sety') {
                sprite.y = parseFloat(params.y) || 0;
                updateStageInfo();
            } else if (bt === 'motion_ifonedgebounce') {
                const halfW = stageWidth / 2;
                const halfH = stageHeight / 2;
                if (Math.abs(sprite.x) > halfW - 5) {
                    sprite.direction = 180 - sprite.direction;
                    sprite.x = Math.sign(sprite.x) * (halfW - 5);
                }
                if (Math.abs(sprite.y) > halfH - 5) {
                    sprite.direction = -sprite.direction;
                    sprite.y = Math.sign(sprite.y) * (halfH - 5);
                }
                updateStageInfo();
            } else if (bt === 'motion_setrotationstyle') {
                sprite.rotationStyle = params.style || 'all';
            } else if (bt === 'motion_xposition') {
                return { value: sprite.x, next: true };
            } else if (bt === 'motion_yposition') {
                return { value: sprite.y, next: true };
            } else if (bt === 'motion_direction') {
                return { value: sprite.direction, next: true };
            }

            // --- LOOKS ---
            else if (bt === 'looks_say') {
                sprite.sayText = params.text || 'Hola';
                sprite.sayTimer = parseFloat(params.secs) || 2;
                sprite.thinkText = '';
                sprite.thinkTimer = 0;
                updateStageInfo();
                drawStage();
                await sleep((parseFloat(params.secs) || 2) * 1000);
                sprite.sayText = '';
                sprite.sayTimer = 0;
                updateStageInfo();
                drawStage();
            } else if (bt === 'looks_sayforever') {
                sprite.sayText = params.text || 'Hola';
                sprite.sayTimer = 9999;
                sprite.thinkText = '';
                updateStageInfo();
                drawStage();
            } else if (bt === 'looks_think') {
                sprite.thinkText = params.text || 'Mmm...';
                sprite.thinkTimer = parseFloat(params.secs) || 2;
                sprite.sayText = '';
                sprite.sayTimer = 0;
                updateStageInfo();
                drawStage();
                await sleep((parseFloat(params.secs) || 2) * 1000);
                sprite.thinkText = '';
                sprite.thinkTimer = 0;
                updateStageInfo();
                drawStage();
            } else if (bt === 'looks_thinkforever') {
                sprite.thinkText = params.text || 'Mmm...';
                sprite.thinkTimer = 9999;
                sprite.sayText = '';
                updateStageInfo();
                drawStage();
            } else if (bt === 'looks_switchcostume') {
                sprite.costume = parseInt(params.costume) || 2;
                updateStageInfo();
            } else if (bt === 'looks_nextcostume') {
                sprite.costume = (sprite.costume % 4) + 1;
                updateStageInfo();
            } else if (bt === 'looks_switchbg') {
                stageBackground = parseInt(params.bg) || 2;
                drawStage();
            } else if (bt === 'looks_changesize') {
                sprite.size += parseFloat(params.dsize) || 10;
                sprite.size = Math.max(5, Math.min(500, sprite.size));
                updateStageInfo();
            } else if (bt === 'looks_setsize') {
                sprite.size = parseFloat(params.size) || 100;
                sprite.size = Math.max(5, Math.min(500, sprite.size));
                updateStageInfo();
            } else if (bt === 'looks_changeeffect') {
                const eff = params.effect || 'color';
                if (sprite.effects[eff] !== undefined) sprite.effects[eff] += parseFloat(params.val) || 5;
                updateStageInfo();
            } else if (bt === 'looks_seteffect') {
                const eff = params.effect || 'ghost';
                if (sprite.effects[eff] !== undefined) sprite.effects[eff] = parseFloat(params.val) || 0;
                updateStageInfo();
            } else if (bt === 'looks_cleareffects') {
                for (const k in sprite.effects) sprite.effects[k] = 0;
                updateStageInfo();
            } else if (bt === 'looks_show') {
                sprite.visible = true;
                updateStageInfo();
            } else if (bt === 'looks_hide') {
                sprite.visible = false;
                updateStageInfo();
            } else if (bt === 'looks_gotofront' || bt === 'looks_goback') {
                // Layer management simplified
                updateStageInfo();
            } else if (bt === 'looks_size') {
                return { value: sprite.size, next: true };
            }

            // --- SOUND ---
            else if (bt === 'sound_play') {
                playSoundEffect(params.sound || 'pop');
            } else if (bt === 'sound_playuntil') {
                playSoundEffect(params.sound || 'pop');
                await sleep(400);
            } else if (bt === 'sound_stopall') {
                // Stop all audio (simplified)
            } else if (bt === 'sound_changevolume') {
                masterVolume = Math.max(0, Math.min(1, masterVolume + (parseFloat(params.dvol) || -10) / 100));
            } else if (bt === 'sound_setvolume') {
                masterVolume = Math.max(0, Math.min(1, (parseFloat(params.vol) || 100) / 100));
            } else if (bt === 'sound_volume') {
                return { value: Math.round(masterVolume * 100), next: true };
            }

            // --- EVENTS (hat blocks start execution) ---
            else if (bt === 'events_broadcast') {
                broadcastQueue.push(params.msg || 'mensaje1');
                log('📡 Enviado: ' + (params.msg || 'mensaje1'));
            } else if (bt === 'events_broadcastwait') {
                broadcastQueue.push(params.msg || 'mensaje1');
                log('📡 Enviado (y esperando): ' + (params.msg || 'mensaje1'));
                await processBroadcasts();
            }

            // --- CONTROL ---
            else if (bt === 'control_wait') {
                await sleep((parseFloat(params.secs) || 1) * 1000);
            } else if (bt === 'control_repeat') {
                const times = parseInt(params.times) || 10;
                const innerIds = getInnerStack(blockId);
                for (let i = 0; i < times; i++) {
                    if (runAbort) return { abort: true };
                    for (const innerId of innerIds) {
                        const result = await executeBlock(innerId, context);
                        if (result && result.abort) return { abort: true };
                    }
                }
            } else if (bt === 'control_forever') {
                const innerIds = getInnerStack(blockId);
                while (!runAbort) {
                    for (const innerId of innerIds) {
                        if (runAbort) return { abort: true };
                        const result = await executeBlock(innerId, context);
                        if (result && result.abort) return { abort: true };
                    }
                    await sleep(30);
                }
                return { abort: true };
            } else if (bt === 'control_if') {
                const cond = evaluateCondition(params.condition, context);
                if (cond) {
                    const innerIds = getInnerStack(blockId);
                    for (const innerId of innerIds) {
                        const result = await executeBlock(innerId, context);
                        if (result && result.abort) return { abort: true };
                    }
                }
            } else if (bt === 'control_ifelse') {
                const cond = evaluateCondition(params.condition, context);
                const innerIds = getInnerStack(blockId);
                // First inner block chain is "if" branch, second inner block (if any) is "else" branch
                // Simplified: execute all inners if true
                if (cond) {
                    for (const innerId of innerIds) {
                        const result = await executeBlock(innerId, context);
                        if (result && result.abort) return { abort: true };
                    }
                }
            } else if (bt === 'control_waituntil') {
                while (!runAbort && !evaluateCondition(params.condition, context)) {
                    await sleep(50);
                }
            } else if (bt === 'control_repeatuntil') {
                const innerIds = getInnerStack(blockId);
                while (!runAbort && !evaluateCondition(params.condition, context)) {
                    for (const innerId of innerIds) {
                        if (runAbort) return { abort: true };
                        const result = await executeBlock(innerId, context);
                        if (result && result.abort) return { abort: true };
                    }
                    await sleep(30);
                }
            } else if (bt === 'control_stop') {
                if (params.what === 'all' || params.what === 'this') {
                    runAbort = true;
                    return { abort: true };
                }
            } else if (bt === 'control_clone') {
                clones.push({ ...sprite, x: sprite.x + 20, y: sprite.y + 20 });
                log('🧬 Clon creado en (' + Math.round(sprite.x + 20) + ', ' + Math.round(sprite.y + 20) + ')');
            } else if (bt === 'control_deleteclone') {
                if (clones.length > 0) clones.pop();
                log('🗑 Clon eliminado');
            }

            // --- SENSING ---
            else if (bt === 'sensing_touchingmouse') {
                const mx = (mouseStageX || 0);
                const my = (mouseStageY || 0);
                const sx = stageWidth / 2 + sprite.x;
                const sy = stageHeight / 2 - sprite.y;
                const dist = Math.sqrt((mx - sx) ** 2 + (my - sy) ** 2);
                return { value: dist < 35, next: true };
            } else if (bt === 'sensing_touchingedge') {
                const hw = stageWidth / 2;
                const hh = stageHeight / 2;
                return { value: Math.abs(sprite.x) > hw - 5 || Math.abs(sprite.y) > hh - 5, next: true };
            } else if (bt === 'sensing_keypressed') {
                return { value: keysPressed.has(params.key || ' '), next: true };
            } else if (bt === 'sensing_mousedown') {
                return { value: mouseIsDown, next: true };
            } else if (bt === 'sensing_mousex') {
                return { value: (mouseStageX || stageWidth / 2) - stageWidth / 2, next: true };
            } else if (bt === 'sensing_mousey') {
                return { value: stageHeight / 2 - (mouseStageY || stageHeight / 2), next: true };
            } else if (bt === 'sensing_timer') {
                return { value: getTimer(), next: true };
            } else if (bt === 'sensing_resettimer') {
                resetTimer();
            } else if (bt === 'sensing_username') {
                return { value: 'Usuario', next: true };
            }

            // --- OPERATORS ---
            else if (bt === 'operators_add') return { value: (parseFloat(params.a) || 0) + (parseFloat(params.b) || 0),
                next: true };
            else if (bt === 'operators_sub') return { value: (parseFloat(params.a) || 0) - (parseFloat(params.b) || 0),
                next: true };
            else if (bt === 'operators_mul') return { value: (parseFloat(params.a) || 0) * (parseFloat(params.b) || 0),
                next: true };
            else if (bt === 'operators_div') return { value: (parseFloat(params.a) || 0) / (parseFloat(params.b) || 1),
                next: true };
            else if (bt === 'operators_random') return { value: Math.floor(Math.random() * ((parseInt(params.max) || 10) - (
                    parseInt(params.min) || 1) + 1)) + (parseInt(params.min) || 1), next: true };
            else if (bt === 'operators_gt') return { value: (parseFloat(params.a) || 0) > (parseFloat(params.b) || 0),
                next: true };
            else if (bt === 'operators_lt') return { value: (parseFloat(params.a) || 0) < (parseFloat(params.b) || 0),
                next: true };
            else if (bt === 'operators_eq') return { value: (parseFloat(params.a) || 0) === (parseFloat(params.b) || 0),
                next: true };
            else if (bt === 'operators_and') return { value: evaluateCondition(params.a, context) && evaluateCondition(
                    params.b, context), next: true };
            else if (bt === 'operators_or') return { value: evaluateCondition(params.a, context) || evaluateCondition(params
                    .b, context), next: true };
            else if (bt === 'operators_not') return { value: !evaluateCondition(params.a, context), next: true };
            else if (bt === 'operators_join') return { value: String(params.a || '') + String(params.b || ''), next: true };
            else if (bt === 'operators_letterof') {
                const txt = String(params.text || '');
                const idx = parseInt(params.idx) || 1;
                return { value: txt.charAt(idx - 1) || '', next: true };
            } else if (bt === 'operators_length') return { value: String(params.text || '').length, next: true };
            else if (bt === 'operators_contains') return { value: String(params.text || '').includes(String(params.sub ||
                    '')), next: true };
            else if (bt === 'operators_mod') return { value: (parseFloat(params.a) || 0) % (parseFloat(params.b) || 1),
                next: true };
            else if (bt === 'operators_round') return { value: Math.round(parseFloat(params.val) || 0), next: true };
            else if (bt === 'operators_sqrt') return { value: Math.sqrt(Math.abs(parseFloat(params.val) || 0)),
            next: true };

            // --- VARIABLES ---
            else if (bt === 'variables_set') {
                variables[params.varname || 'miVar'] = parseFloat(params.val) || 0;
                updateStageInfo();
            } else if (bt === 'variables_change') {
                if (variables[params.varname || 'miVar'] === undefined) variables[params.varname || 'miVar'] = 0;
                variables[params.varname || 'miVar'] += parseFloat(params.dval) || 1;
                updateStageInfo();
            } else if (bt === 'variables_get') {
                return { value: variables[params.varname || 'miVar'] ?? 0, next: true };
            } else if (bt === 'variables_show' || bt === 'variables_hide') {
                updateStageInfo();
            } else if (bt === 'variables_addtolist') {
                if (!lists[params.listname || 'miLista']) lists[params.listname || 'miLista'] = [];
                lists[params.listname || 'miLista'].push(params.item || 'cosa');
                updateStageInfo();
            } else if (bt === 'variables_deleteoflist') {
                const lst = lists[params.listname || 'miLista'] || [];
                const idx = parseInt(params.idx) || 1;
                if (idx > 0 && idx <= lst.length) lst.splice(idx - 1, 1);
                updateStageInfo();
            } else if (bt === 'variables_getlist') {
                const lst = lists[params.listname || 'miLista'] || [];
                const idx = parseInt(params.idx) || 1;
                return { value: lst[idx - 1] ?? '', next: true };
            } else if (bt === 'variables_lengthlist') {
                return { value: (lists[params.listname || 'miLista'] || []).length, next: true };
            } else if (bt === 'variables_containslist') {
                return { value: (lists[params.listname || 'miLista'] || []).includes(params.item || 'cosa'),
                next: true };
            }

            // --- MY BLOCKS ---
            else if (bt === 'myblocks_define') {
                // Definitions are stored but executed via calls
                log('📝 Definido: ' + (params.name || 'miBloque'));
            } else if (bt === 'myblocks_call') {
                // Find definition and execute its stack
                const defName = params.name || 'miBloque';
                for (const [id, wb] of Object.entries(workspaceBlocks)) {
                    if (wb.blockType === 'myblocks_define' && wb.params.name === defName) {
                        const stack = getStack(id);
                        for (const sid of stack) {
                            if (sid === id) continue; // skip the define block itself
                            const result = await executeBlock(sid, context);
                            if (result && result.abort) return { abort: true };
                        }
                        break;
                    }
                }
            }

            return { next: true };
        }

        function evaluateCondition(condStr, context) {
            if (condStr === 'true') return true;
            if (condStr === 'false') return false;
            // Try to evaluate as expression
            try {
                return !!eval(condStr);
            } catch (e) {
                return true;
            }
        }

        function sleep(ms) {
            return new Promise(resolve => {
                const id = setTimeout(resolve, ms);
                if (runAbort) clearTimeout(id);
            });
        }

        async function processBroadcasts() {
            const processed = new Set();
            while (broadcastQueue.length > 0 && !runAbort) {
                const msg = broadcastQueue.shift();
                if (processed.has(msg)) continue;
                processed.add(msg);
                // Find all "when receive" blocks matching this message
                for (const [id, wb] of Object.entries(workspaceBlocks)) {
                    if (runAbort) break;
                    if (wb.blockType === 'events_whenreceive' && wb.params.msg === msg) {
                        const stack = getStack(id);
                        for (const sid of stack) {
                            if (runAbort) break;
                            const result = await executeBlock(sid);
                            if (result && result.abort) break;
                        }
                    }
                }
            }
        }

        async function runStack(startBlockId) {
            const stack = getStack(startBlockId);
            for (const blockId of stack) {
                if (runAbort) break;
                const result = await executeBlock(blockId);
                if (result && result.abort) break;
            }
        }

        async function runAllHatBlocks() {
            runAbort = false;
            isRunning = true;
            broadcastQueue = [];
            log('🚩 Proyecto iniciado...');
            resetTimer();

            // Find all hat blocks and run them
            const hatBlocks = [];
            for (const [id, wb] of Object.entries(workspaceBlocks)) {
                if (wb.shape === 'hat') {
                    hatBlocks.push(id);
                }
            }

            // Run "when green flag" blocks first
            const flagBlocks = hatBlocks.filter(id => workspaceBlocks[id].blockType === 'events_whenflag');
            const otherHats = hatBlocks.filter(id => !flagBlocks.includes(id));

            const runStackAsync = async (startId) => {
                const stack = getStack(startId);
                for (const blockId of stack) {
                    if (runAbort) break;
                    const result = await executeBlock(blockId);
                    if (result && result.abort) break;
                }
            };

            // Run flag blocks concurrently
            const promises = flagBlocks.map(id => runStackAsync(id));
            await Promise.all(promises);

            // Process any broadcasts
            await processBroadcasts();

            if (!runAbort) {
                log('✅ Ejecución completada.');
            } else {
                log('⏹ Ejecución detenida.');
            }
            isRunning = false;
            updateStageInfo();
            drawStage();
        }

        function runProject() {
            if (isRunning) {
                stopProject();
                setTimeout(() => runAllHatBlocks(), 100);
                return;
            }
            runAllHatBlocks();
        }

        function stopProject() {
            runAbort = true;
            isRunning = false;
            broadcastQueue = [];
            sprite.sayText = '';
            sprite.sayTimer = 0;
            sprite.thinkText = '';
            sprite.thinkTimer = 0;
            log('⏹ Detenido.');
            updateStageInfo();
            drawStage();
        }

        // --- Mouse tracking on stage ---
        let mouseStageX = stageWidth / 2;
        let mouseStageY = stageHeight / 2;
        let mouseIsDown = false;
        const keysPressed = new Set();

        stageCanvas.addEventListener('mousemove', (e) => {
            const rect = stageCanvas.getBoundingClientRect();
            const scaleX = stageWidth / rect.width;
            const scaleY = stageHeight / rect.height;
            mouseStageX = (e.clientX - rect.left) * scaleX;
            mouseStageY = (e.clientY - rect.top) * scaleY;
        });
        stageCanvas.addEventListener('mousedown', () => { mouseIsDown = true; });
        stageCanvas.addEventListener('mouseup', () => { mouseIsDown = false; });
        stageCanvas.addEventListener('mouseleave', () => { mouseIsDown = false; });
        document.addEventListener('keydown', (e) => { keysPressed.add(e.key);
            keysPressed.add(e.key.toLowerCase()); });
        document.addEventListener('keyup', (e) => { keysPressed.delete(e.key);
            keysPressed.delete(e.key.toLowerCase()); });

        // --- Save / Load ---
        function saveProject() {
            const project = {
                version: '1.0',
                sprite: JSON.parse(JSON.stringify(sprite)),
                stageBackground,
                variables: JSON.parse(JSON.stringify(variables)),
                lists: JSON.parse(JSON.stringify(lists)),
                blocks: [],
            };
            for (const [id, wb] of Object.entries(workspaceBlocks)) {
                project.blocks.push({
                    id,
                    blockType: wb.blockType,
                    shape: wb.shape,
                    color: wb.color,
                    params: wb.params,
                    x: parseInt(wb.div.style.left) || 0,
                    y: parseInt(wb.div.style.top) || 0,
                    nextBlockId: wb.nextBlockId,
                    prevBlockId: wb.prevBlockId,
                    parentCBlockId: wb.parentCBlockId,
                    innerBlockIds: wb.innerBlockIds,
                    label: wb.div.textContent.replace(/[\n\r]/g, '').trim().substring(0, 80),
                });
            }
            const json = JSON.stringify(project, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'BlockIngenier_proyecto.json';
            a.click();
            URL.revokeObjectURL(url);
            toast('💾 Proyecto guardado!');
            log('💾 Proyecto guardado como archivo JSON.');
        }

        function loadProject() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const project = JSON.parse(ev.target.result);
                        // Clear workspace
                        clearWorkspaceSilent();
                        // Restore sprite
                        if (project.sprite) {
                            sprite = { ...sprite, ...project.sprite };
                            if (project.sprite.effects) sprite.effects = { ...sprite.effects, ...project.sprite
                                    .effects };
                        }
                        if (project.stageBackground) stageBackground = project.stageBackground;
                        if (project.variables) variables = project.variables;
                        if (project.lists) lists = project.lists;
                        // Restore blocks
                        if (project.blocks) {
                            project.blocks.forEach(bd => {
                                const id = createWorkspaceBlockRaw(bd.id, bd.blockType, bd.label || bd
                                    .blockType, bd.shape, bd.color, bd.params, bd.x, bd.y);
                                const wb = workspaceBlocks[id];
                                if (wb) {
                                    wb.nextBlockId = bd.nextBlockId || null;
                                    wb.prevBlockId = bd.prevBlockId || null;
                                    wb.parentCBlockId = bd.parentCBlockId || null;
                                    wb.innerBlockIds = bd.innerBlockIds || [];
                                    wb.div._nextBlockId = wb.nextBlockId;
                                    wb.div._prevBlockId = wb.prevBlockId;
                                    wb.div._parentCBlockId = wb.parentCBlockId;
                                    wb.div._innerBlockIds = wb.innerBlockIds;
                                }
                            });
                        }
                        updateStageInfo();
                        drawStage();
                        toast('📂 Proyecto cargado!');
                        log('📂 Proyecto cargado exitosamente.');
                    } catch (err) {
                        toast('❌ Error al cargar el archivo.');
                        log('❌ Error: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function createWorkspaceBlockRaw(id, blockType, label, shape, color, params, x, y) {
            const div = document.createElement('div');
            div.className = 'ws-block';
            div.style.background = color;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.dataset.blockId = id;
            div.dataset.blockType = blockType;
            div.dataset.shape = shape;
            div.dataset.color = color;
            div.textContent = label;
            div.title = blockType + ' | ID: ' + id;
            if (shape === 'hat') div.classList.add('hat-block');
            else if (shape === 'cblock') {
                div.classList.add('c-block');
                const inner = document.createElement('div');
                inner.className = 'inner-area';
                inner.dataset.innerFor = id;
                div.appendChild(inner);
                div.textContent = label;
                div.appendChild(inner);
            } else if (shape === 'reporter') div.classList.add('reporter-block');
            else if (shape === 'boolean') div.classList.add('boolean-block');
            if (shape !== 'hat') {
                const tn = document.createElement('div');
                tn.className = 'block-top-notch';
                tn.style.background = color;
                div.appendChild(tn);
            }
            if (shape !== 'reporter' && shape !== 'boolean') {
                const n = document.createElement('div');
                n.className = 'block-notch';
                n.style.background = color;
                div.appendChild(n);
            }
            div._params = JSON.parse(JSON.stringify(params || {}));
            div._nextBlockId = null;
            div._prevBlockId = null;
            div._parentCBlockId = null;
            div._innerBlockIds = [];
            div.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    e.stopPropagation();
                    selectBlock(id);
                    if (!isRunning) {
                        isDragging = true;
                        dragTarget = div;
                        const rect = div.getBoundingClientRect();
                        dragOffsetX = e.clientX - rect.left;
                        dragOffsetY = e.clientY - rect.top;
                        div.style.zIndex = 70;
                        div.style.cursor = 'grabbing';
                    }
                }
                if (e.button === 2) { e.preventDefault();
                    e.stopPropagation();
                    selectBlock(id);
                    showContextMenu(e.clientX, e.clientY); }
            });
            div.addEventListener('contextmenu', (e) => { e.preventDefault();
                selectBlock(id);
                showContextMenu(e.clientX, e.clientY); });
            document.getElementById('workspace').appendChild(div);
            workspaceBlocks[id] = { div, blockType, shape, color, params: div._params, nextBlockId: null, prevBlockId: null,
                parentCBlockId: null, innerBlockIds: [] };
            if (parseInt(id.replace('b', '')) >= blockIdCounter) blockIdCounter = parseInt(id.replace('b', '')) + 1;
            return id;
        }

        function clearWorkspace() {
            if (isRunning) stopProject();
            const ws = document.getElementById('workspace');
            while (ws.firstChild) ws.removeChild(ws.firstChild);
            workspaceBlocks = {};
            selectedBlockId = null;
            blockIdCounter = 0;
            toast('🗑 Área de trabajo limpiada.');
            log('🗑 Todos los bloques eliminados.');
        }

        function clearWorkspaceSilent() {
            const ws = document.getElementById('workspace');
            while (ws.firstChild) ws.removeChild(ws.firstChild);
            workspaceBlocks = {};
            selectedBlockId = null;
            blockIdCounter = 0;
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 1800);
        }

        // --- Initialize ---
        function init() {
            buildSidebar();
            updateStageInfo();
            drawStage();
            resetTimer();
            log('🧩 BlockIngenier listo. Arrastra bloques desde la paleta al área de trabajo.');
            log('💡 Conecta bloques entre sí y presiona "Ejecutar" para ver la magia.');

            // Add some demo blocks
            const demoX = 40;
            const demoY = 20;
            const id1 = createWorkspaceBlock('events_whenflag', 'Al hacer clic en bandera verde', 'hat', '#FFBF00', {},
                demoX, demoY);
            const id2 = createWorkspaceBlock('motion_gotoxy', 'Ir a X:0 Y:0', 'stack', '#4C97FF', { x: 0, y: 0 }, demoX,
                demoY + 50);
            const id3 = createWorkspaceBlock('looks_say', 'Decir "¡Hola BlockIngenier!" por 2 seg', 'stack', '#9966FF', {
                text: '¡Hola BlockIngenier!',
                secs: 2 }, demoX, demoY + 100);
            const id4 = createWorkspaceBlock('control_repeat', 'Repetir 4 veces', 'cblock', '#FFAB19', { times: 4 }, demoX,
                demoY + 150);
            const id5 = createWorkspaceBlock('motion_movesteps', 'Mover 30 pasos', 'stack', '#4C97FF', { steps: 30 },
                demoX + 30, demoY + 210);
            const id6 = createWorkspaceBlock('motion_turnright', 'Girar derecha 90°', 'stack', '#4C97FF', { degrees: 90 },
                demoX + 30, demoY + 260);

            // Connect demo blocks
            workspaceBlocks[id1].nextBlockId = id2;
            workspaceBlocks[id1].div._nextBlockId = id2;
            workspaceBlocks[id2].prevBlockId = id1;
            workspaceBlocks[id2].div._prevBlockId = id1;
            workspaceBlocks[id2].nextBlockId = id3;
            workspaceBlocks[id2].div._nextBlockId = id3;
            workspaceBlocks[id3].prevBlockId = id2;
            workspaceBlocks[id3].div._prevBlockId = id2;
            workspaceBlocks[id3].nextBlockId = id4;
            workspaceBlocks[id3].div._nextBlockId = id4;
            workspaceBlocks[id4].prevBlockId = id3;
            workspaceBlocks[id4].div._prevBlockId = id3;
            workspaceBlocks[id4].innerBlockIds = [id5];
            workspaceBlocks[id4].div._innerBlockIds = [id5];
            workspaceBlocks[id5].parentCBlockId = id4;
            workspaceBlocks[id5].div._parentCBlockId = id4;
            workspaceBlocks[id5].nextBlockId = id6;
            workspaceBlocks[id5].div._nextBlockId = id6;
            workspaceBlocks[id6].prevBlockId = id5;
            workspaceBlocks[id6].div._prevBlockId = id5;

            // Initialize default variable
            variables['miVar'] = 0;
            variables['puntos'] = 0;
            lists['miLista'] = ['manzana', 'pera', 'uva'];
            updateStageInfo();
        }

        // --- Animation loop for stage ---
        function animationLoop() {
            if (sprite.sayTimer > 0 && sprite.sayTimer < 9999) {
                sprite.sayTimer -= 0.03;
                if (sprite.sayTimer <= 0) { sprite.sayText = '';
                    sprite.sayTimer = 0; }
            }
            if (sprite.thinkTimer > 0 && sprite.thinkTimer < 9999) {
                sprite.thinkTimer -= 0.03;
                if (sprite.thinkTimer <= 0) { sprite.thinkText = '';
                    sprite.thinkTimer = 0; }
            }
            if (!isRunning || runAbort) {
                drawStage();
            }
            updateStageInfo();
            requestAnimationFrame(animationLoop);
        }

        init();
        animationLoop();
        log('✅ BlockIngenier inicializado correctamente.');
        log('📋 Categorías: Movimiento, Apariencia, Sonido, Eventos, Control, Sensores, Operadores, Variables, Mis Bloques.');
    </script>
</body>
