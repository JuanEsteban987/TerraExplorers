<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockIngenier - Entorno de Programación por Bloques</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --surface2: #0f3460;
            --text: #e0e0e0;
            --text2: #b0b0b0;
            --motion: #4C97FF;
            --looks: #9966FF;
            --sound: #CF63CF;
            --events: #FFBF00;
            --control: #FFAB19;
            --sensing: #5CB1D6;
            --operators: #59C059;
            --variables: #FF8C1A;
            --myblocks: #FF6680;
            --border: #2a2a4a;
            --accent: #4da6ff;
            --stage-bg: #f0f0f5;
            --workspace-bg: #1e1e35;
            --block-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            --header-bg: #0d0d1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* HEADER */
        #header {
            background: var(--header-bg);
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            z-index: 100;
            position: relative;
            flex-shrink: 0;
        }
        #header .logo {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        #header .logo span {
            color: #ff6b9d;
        }
        #header button {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 7px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.15s;
            white-space: nowrap;
        }
        #header button:hover {
            background: #1a4a80;
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(77, 166, 255, 0.2);
        }
        #header button.run-btn {
            background: #2d8a4e;
            border-color: #3cb868;
            font-weight: 700;
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0%,
            100% {
                box-shadow: 0 0 8px rgba(60, 184, 104, 0.4);
            }
            50% {
                box-shadow: 0 0 20px rgba(60, 184, 104, 0.8);
            }
        }
        #header button.stop-btn {
            background: #8a2d2d;
            border-color: #b83c3c;
            font-weight: 700;
        }
        #header button.stop-btn:hover {
            background: #a03030;
            box-shadow: 0 0 12px rgba(255, 80, 80, 0.4);
        }
        #header .separator {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 4px;
        }

        /* MAIN LAYOUT */
        #main {
            display: flex;
            height: calc(100vh - 50px);
            position: relative;
        }

        /* LEFT SIDEBAR - Block Palette */
        #sidebar {
            width: 220px;
            min-width: 220px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 4px 0;
            z-index: 50;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }
        #sidebar::-webkit-scrollbar {
            width: 5px;
        }
        #sidebar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
        .category-header {
            padding: 8px 14px;
            font-weight: 700;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
            border-radius: 0;
            margin: 1px 6px;
            color: #ccc;
        }
        .category-header:hover {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
        }
        .category-header .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .category-blocks {
            padding: 2px 8px;
            display: block;
        }
        .category-blocks.collapsed {
            display: none;
        }
        .palette-block {
            padding: 7px 10px;
            margin: 3px 0;
            border-radius: 6px;
            cursor: grab;
            font-size: 0.78em;
            font-weight: 500;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.12s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.2px;
            position: relative;
        }
        .palette-block:hover {
            transform: translateX(3px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.35);
            z-index: 10;
        }
        .palette-block:active {
            cursor: grabbing;
            opacity: 0.8;
            transform: scale(0.96);
        }

        /* WORKSPACE */
        #workspace-container {
            flex: 1;
            position: relative;
            background: var(--workspace-bg);
            overflow: auto;
            background-image: radial-gradient(circle, #252545 1px, transparent 1px);
            background-size: 24px 24px;
        }
        #workspace {
            width: 4000px;
            height: 4000px;
            position: relative;
            min-width: 100%;
            min-height: 100%;
        }
        .ws-block {
            position: absolute;
            padding: 8px 12px;
            border-radius: 7px;
            cursor: grab;
            font-size: 0.8em;
            font-weight: 500;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.2);
            min-width: 80px;
            text-align: center;
            z-index: 10;
            box-shadow: var(--block-shadow);
            transition: box-shadow 0.15s, border-color 0.15s;
            letter-spacing: 0.3px;
        }
        .ws-block:hover {
            z-index: 50;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .ws-block.selected {
            border-color: #fff !important;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5) !important;
            z-index: 60 !important;
        }
        .ws-block.running {
            animation: block-glow 0.5s ease-in-out;
            border-color: #fff !important;
            box-shadow: 0 0 25px rgba(255, 255, 100, 0.7) !important;
        }
        @keyframes block-glow {
            0%,
            100% {
                box-shadow: 0 0 25px rgba(255, 255, 100, 0.7);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 255, 200, 1);
            }
        }
        .ws-block .block-notch {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 12px;
            background: inherit;
            border-radius: 0 0 4px 4px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top: none;
            z-index: 5;
        }
        .ws-block .block-top-notch {
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 12px;
            background: inherit;
            border-radius: 4px 4px 0 0;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-bottom: none;
            z-index: 5;
        }
        .ws-block.c-block {
            border-radius: 12px 7px 7px 12px;
            padding-left: 16px;
            min-height: 50px;
        }
        .ws-block.c-block .inner-area {
            border: 2px dashed rgba(255, 255, 255, 0.25);
            border-radius: 4px;
            min-height: 28px;
            margin: 6px 4px 6px 8px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.2);
            position: relative;
        }
        .ws-block.hat-block {
            border-radius: 14px 14px 7px 7px;
            border-top-width: 3px;
        }
        .ws-block.reporter-block {
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-weight: 600;
        }
        .ws-block.boolean-block {
            border-radius: 20px;
            min-width: 60px;
            padding: 6px 14px;
        }

        /* STAGE PANEL */
        #stage-panel {
            width: 380px;
            min-width: 380px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 8px;
            z-index: 50;
        }
        #stage-wrapper {
            background: var(--stage-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid #333;
            position: relative;
            aspect-ratio: 4/3;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        #stage-canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #fff;
        }
        #sprite-info {
            background: var(--surface2);
            border-radius: 8px;
            padding: 10px;
            font-size: 0.8em;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        #sprite-info span {
            color: var(--text2);
        }
        #sprite-info strong {
            color: var(--accent);
        }
        #variable-display {
            background: var(--surface2);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.78em;
            max-height: 150px;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        #variable-display .var-item {
            background: #2a2a4a;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            border: 1px solid #444;
        }
        #variable-display .var-item strong {
            color: #ffab19;
        }
        #output-console {
            background: #0a0a14;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.7em;
            max-height: 80px;
            overflow-y: auto;
            color: #8f8;
            font-family: 'Consolas', 'Monaco', monospace;
            border: 1px solid #333;
        }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d8a4e;
            color: #fff;
            padding: 10px 24px;
            border-radius: 20px;
            font-weight: 600;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5);
        }
        #toast.show {
            opacity: 1;
        }

        /* Context menu */
        #context-menu {
            position: fixed;
            background: #1e1e3a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 4px 0;
            z-index: 200;
            display: none;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
            min-width: 140px;
        }
        #context-menu div {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.8em;
            transition: background 0.1s;
        }
        #context-menu div:hover {
            background: #2a2a5a;
        }

        @media (max-width: 1000px) {
            #stage-panel {
                width: 280px;
                min-width: 280px;
            }
            #sidebar {
                width: 170px;
                min-width: 170px;
            }
            .palette-block {
                font-size: 0.7em;
                padding: 5px 7px;
            }
        }
        @media (max-width: 750px) {
            #main {
                flex-direction: column;
            }
            #sidebar {
                width: 100%;
                min-width: 100%;
                max-height: 140px;
                display: flex;
                flex-wrap: wrap;
                overflow-y: auto;
                gap: 2px;
                padding: 4px;
            }
            #sidebar .category-header {
                font-size: 0.65em;
                padding: 4px 6px;
                margin: 1px;
            }
            #sidebar .category-blocks {
                display: flex;
                flex-wrap: wrap;
                gap: 2px;
            }
            .palette-block {
                font-size: 0.65em;
                padding: 4px 6px;
                margin: 1px;
            }
            #stage-panel {
                width: 100%;
                min-width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
            }
            #stage-wrapper {
                width: 150px;
                aspect-ratio: 4/3;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div id="header">
        <div class="logo">🧩 Block<span>Ingenier</span></div>
        <div class="separator"></div>
        <button onclick="runProject()" class="run-btn" title="Ejecutar proyecto (Bandera verde)">🚩 Ejecutar</button>
        <button onclick="stopProject()" class="stop-btn" title="Detener todo">⏹ Detener</button>
        <div class="separator"></div>
        <button onclick="saveProject()" title="Guardar proyecto como archivo">💾 Guardar</button>
        <button onclick="loadProject()" title="Cargar proyecto desde archivo">📂 Cargar</button>
        <button onclick="clearWorkspace()" title="Limpiar área de trabajo">🗑 Limpiar</button>
        <span style="font-size:0.7em;color:#888;margin-left:auto;">v1.0 · Turbowarp Style</span>
    </div>

    <!-- MAIN -->
    <div id="main">
        <!-- SIDEBAR -->
        <div id="sidebar"></div>

        <!-- WORKSPACE -->
        <div id="workspace-container">
            <div id="workspace"></div>
        </div>

        <!-- STAGE PANEL -->
        <div id="stage-panel">
            <div id="stage-wrapper">
                <canvas id="stage-canvas" width="480" height="360"></canvas>
            </div>
            <div id="sprite-info">
                <span>Sprite:</span><strong id="sprite-name">Gato</strong>
                <span>X:</span><strong id="sprite-x">0</strong>
                <span>Y:</span><strong id="sprite-y">0</strong>
                <span>Dir:</span><strong id="sprite-dir">90°</strong>
                <span>Tam:</span><strong id="sprite-size">100%</strong>
            </div>
            <div id="variable-display"></div>
            <div id="output-console">▶ Consola lista. Ejecuta el proyecto para ver resultados.</div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- CONTEXT MENU -->
    <div id="context-menu">
        <div onclick="duplicateBlock()">📋 Duplicar</div>
        <div onclick="deleteSelectedBlock()">🗑 Eliminar</div>
        <div onclick="disconnectBlock()">🔗 Desconectar</div>
    </div>

    <script>
        // ==================== BLOCKINGENIER ENGINE ====================

        // --- Global State ---
        let blockIdCounter = 0;
        let selectedBlockId = null;
        let isDragging = false;
        let dragTarget = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let workspaceBlocks = {}; // id -> block data
        let connectedStacks = {}; // stackId -> [blockIds in order]
        let stackCounter = 0;
        let isRunning = false;
        let runAbort = false;
        let variables = {};
        let lists = {};
        let broadcastQueue = [];
        let clones = [];
        let currentStackId = null;

        // Sprite state
        let sprite = {
            x: 0,
            y: 0,
            direction: 90,
            size: 100,
            visible: true,
            costume: 1,
            rotationStyle: 'all', // 'all', 'left-right', 'none'
            effects: { color: 0, fisheye: 0, whirl: 0, pixelate: 0, mosaic: 0, brightness: 0, ghost: 0 },
            sayText: '',
            sayTimer: 0,
            thinkText: '',
            thinkTimer: 0,
            dragging: false,
            penDown: false,
            penColor: '#000000',
            penSize: 2,
        };

        // Stage
        let stageBackground = 1;
        let stageWidth = 480;
        let stageHeight = 360;

        // --- Block Categories Definition ---
        const categories = [{
            id: 'motion',
            name: 'Movimiento',
            color: '#4C97FF',
            dot: '#4C97FF',
            blocks: [
                { type: 'motion_movesteps', label: 'Mover 10 pasos', shape: 'stack', defaultParams: { steps: 10 } },
                { type: 'motion_turnright', label: 'Girar derecha 15°', shape: 'stack',
                defaultParams: { degrees: 15 } },
                { type: 'motion_turnleft', label: 'Girar izquierda 15°', shape: 'stack',
                    defaultParams: { degrees: 15 } },
                { type: 'motion_goto', label: 'Ir a posición aleatoria', shape: 'stack', defaultParams: {} },
                { type: 'motion_gotoxy', label: 'Ir a X:0 Y:0', shape: 'stack', defaultParams: { x: 0, y: 0 } },
                { type: 'motion_glide', label: 'Deslizar 1 seg a X:0 Y:0', shape: 'stack',
                defaultParams: { secs: 1, x: 0, y: 0 } },
                { type: 'motion_pointdir', label: 'Apuntar en dirección 90', shape: 'stack',
                    defaultParams: { dir: 90 } },
                { type: 'motion_pointtowards', label: 'Apuntar hacia puntero', shape: 'stack',
                    defaultParams: { target: 'mouse' } },
                { type: 'motion_changex', label: 'Cambiar X por 10', shape: 'stack', defaultParams: { dx: 10 } },
                { type: 'motion_setx', label: 'Fijar X a 0', shape: 'stack', defaultParams: { x: 0 } },
                { type: 'motion_changey', label: 'Cambiar Y por 10', shape: 'stack', defaultParams: { dy: 10 } },
                { type: 'motion_sety', label: 'Fijar Y a 0', shape: 'stack', defaultParams: { y: 0 } },
                { type: 'motion_ifonedgebounce', label: 'Si toca borde, rebotar', shape: 'stack',
                defaultParams: {} },
                { type: 'motion_setrotationstyle', label: 'Fijar estilo rotación: todo', shape: 'stack',
                    defaultParams: { style: 'all' } },
                { type: 'motion_xposition', label: 'Posición X', shape: 'reporter', defaultParams: {} },
                { type: 'motion_yposition', label: 'Posición Y', shape: 'reporter', defaultParams: {} },
                { type: 'motion_direction', label: 'Dirección', shape: 'reporter', defaultParams: {} },
            ]
        }, {
            id: 'looks',
            name: 'Apariencia',
            color: '#9966FF',
            dot: '#9966FF',
            blocks: [
                { type: 'looks_say', label: 'Decir "Hola" por 2 seg', shape: 'stack',
                defaultParams: { text: 'Hola', secs: 2 } },
                { type: 'looks_sayforever', label: 'Decir "Hola"', shape: 'stack', defaultParams: { text: 'Hola' } },
                { type: 'looks_think', label: 'Pensar "Mmm..." por 2 seg', shape: 'stack',
                    defaultParams: { text: 'Mmm...', secs: 2 } },
                { type: 'looks_thinkforever', label: 'Pensar "Mmm..."', shape: 'stack',
                defaultParams: { text: 'Mmm...' } },
                { type: 'looks_switchcostume', label: 'Cambiar disfraz a 2', shape: 'stack',
                    defaultParams: { costume: 2 } },
                { type: 'looks_nextcostume', label: 'Siguiente disfraz', shape: 'stack', defaultParams: {} },
                { type: 'looks_switchbg', label: 'Cambiar fondo a 2', shape: 'stack', defaultParams: { bg: 2 } },
                { type: 'looks_changesize', label: 'Cambiar tamaño por 10', shape: 'stack', defaultParams: { dsize: 10 } },
                { type: 'looks_setsize', label: 'Fijar tamaño a 100%', shape: 'stack', defaultParams: { size: 100 } },
                { type: 'looks_changeeffect', label: 'Cambiar efecto color por 5', shape: 'stack',
                    defaultParams: { effect: 'color', val: 5 } },
                { type: 'looks_seteffect', label: 'Fijar efecto fantasma a 0', shape: 'stack',
                    defaultParams: { effect: 'ghost', val: 0 } },
                { type: 'looks_cleareffects', label: 'Quitar efectos gráficos', shape: 'stack', defaultParams: {} },
                { type: 'looks_show', label: 'Mostrar', shape: 'stack', defaultParams: {} },
                { type: 'looks_hide', label: 'Esconder', shape: 'stack', defaultParams: {} },
                { type: 'looks_gotofront', label: 'Ir a capa delante', shape: 'stack', defaultParams: {} },
                { type: 'looks_goback', label: 'Ir a capa atrás', shape: 'stack', defaultParams: {} },
                { type: 'looks_size', label: 'Tamaño', shape: 'reporter', defaultParams: {} },
            ]
        }, {
            id: 'sound',
            name: 'Sonido',
            color: '#CF63CF',
            dot: '#CF63CF',
            blocks: [
                { type: 'sound_play', label: 'Iniciar sonido "pop"', shape: 'stack', defaultParams: { sound: 'pop' } },
                { type: 'sound_playuntil', label: 'Tocar sonido "pop" hasta terminar', shape: 'stack',
                    defaultParams: { sound: 'pop' } },
                { type: 'sound_stopall', label: 'Detener todos los sonidos', shape: 'stack', defaultParams: {} },
                { type: 'sound_changevolume', label: 'Cambiar volumen por -10', shape: 'stack',
                    defaultParams: { dvol: -10 } },
                { type: 'sound_setvolume', label: 'Fijar volumen a 100%', shape: 'stack', defaultParams: { vol: 100 } },
                { type: 'sound_volume', label: 'Volumen', shape: 'reporter', defaultParams: {} },
            ]
        }, {
            id: 'events',
            name: 'Eventos',
            color: '#FFBF00',
            dot: '#FFBF00',
            blocks: [
                { type: 'events_whenflag', label: 'Al hacer clic en bandera verde', shape: 'hat',
                defaultParams: {} },
                { type: 'events_whenkey', label: 'Al presionar tecla [espacio]', shape: 'hat',
                    defaultParams: { key: ' ' } },
                { type: 'events_whenclicked', label: 'Al hacer clic en este objeto', shape: 'hat',
                defaultParams: {} },
                { type: 'events_whenbgchange', label: 'Cuando el fondo cambie a [1]', shape: 'hat',
                    defaultParams: { bg: 1 } },
                { type: 'events_broadcast', label: 'Enviar "mensaje1"', shape: 'stack',
                defaultParams: { msg: 'mensaje1' } },
                { type: 'events_broadcastwait', label: 'Enviar "mensaje1" y esperar', shape: 'stack',
                    defaultParams: { msg: 'mensaje1' } },
                { type: 'events_whenreceive', label: 'Al recibir "mensaje1"', shape: 'hat',
                    defaultParams: { msg: 'mensaje1' } },
            ]
        }, {
            id: 'control',
            name: 'Control',
            color: '#FFAB19',
            dot: '#FFAB19',
            blocks: [
                { type: 'control_wait', label: 'Esperar 1 segundos', shape: 'stack', defaultParams: { secs: 1 } },
                { type: 'control_repeat', label: 'Repetir 10 veces', shape: 'cblock', defaultParams: { times: 10 } },
                { type: 'control_forever', label: 'Por siempre', shape: 'cblock', defaultParams: {} },
                { type: 'control_if', label: 'Si [condición] entonces', shape: 'cblock', defaultParams: {
                    condition: 'true' } },
                { type: 'control_ifelse', label: 'Si [cond] entonces... si no', shape: 'cblock',
                    defaultParams: { condition: 'true' } },
                { type: 'control_waituntil', label: 'Esperar hasta que [cond]', shape: 'stack',
                    defaultParams: { condition: 'true' } },
                { type: 'control_repeatuntil', label: 'Repetir hasta que [cond]', shape: 'cblock',
                    defaultParams: { condition: 'false' } },
